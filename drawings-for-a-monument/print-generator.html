<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DfaM Print Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:24px}
h1{font-size:24px;font-weight:300;letter-spacing:2px;margin-bottom:24px;color:#fff}
h1 span{font-weight:600}
.controls{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;margin-bottom:24px;background:#242424;padding:20px;border-radius:8px}
.control-group{display:flex;flex-direction:column;gap:6px}
.control-group label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888}
input[type="number"]{background:#333;border:1px solid #444;color:#fff;padding:8px 12px;border-radius:4px;font-family:'SF Mono','Fira Code',monospace;font-size:13px;width:120px}
input[type="number"]:focus{outline:none;border-color:#666}
.checkbox-group{display:flex;align-items:center;gap:6px;padding-top:18px}
.checkbox-group input{cursor:pointer}
.checkbox-group label{font-size:13px;color:#ccc;cursor:pointer;text-transform:none;letter-spacing:0}
button{padding:8px 20px;border:none;border-radius:4px;font-size:13px;cursor:pointer;transition:background 0.2s}
button.primary{background:#4a9eff;color:#fff}
button.primary:hover{background:#3a8eef}
button.primary:disabled{background:#333;color:#666;cursor:not-allowed}
button.secondary{background:#333;color:#ccc;border:1px solid #444}
button.secondary:hover{background:#3a3a3a}
button.secondary:disabled{background:#2a2a2a;color:#555;cursor:not-allowed}
.info-panel{background:#242424;padding:16px 20px;border-radius:8px;margin-bottom:24px;display:none}
.info-panel.visible{display:block}
.info-row{display:flex;gap:32px;flex-wrap:wrap;align-items:center}
.info-item{display:flex;flex-direction:column;gap:4px}
.info-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888}
.info-value{font-size:14px;color:#fff}
.palette-display{display:flex;gap:4px;align-items:center}
.palette-swatch{width:24px;height:24px;border-radius:3px;border:1px solid rgba(255,255,255,0.1)}
.preview-container{position:relative;margin-bottom:24px}
.preview-container canvas{max-width:100%;height:auto;border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.status{font-size:13px;color:#888;margin-bottom:16px;min-height:20px}
.status.generating{color:#4a9eff}
.status.done{color:#4aff7a}
.status.error{color:#ff4a4a}
.size-info{font-size:11px;color:#666;padding-top:20px}
</style>
</head>
<body>
<div class="container">
<h1><span>DfaM</span> Print Generator</h1>
<div class="controls">
  <div class="control-group"><label>Token Number</label>
    <input type="number" id="tokenInput" min="0" max="999" placeholder="0–999" spellcheck="false">
  </div>
  <div class="checkbox-group"><input type="checkbox" id="regDots"><label for="regDots">Registration dots</label></div>
  <div class="control-group" style="padding-top:16px"><button class="primary" id="generateBtn" onclick="generate()">Generate</button></div>
  <div class="control-group" style="padding-top:16px"><button class="secondary" id="downloadBtn" onclick="downloadPNG()" disabled>Download PNG</button></div>
  <div class="size-info">11&times;17&Prime; landscape &middot; 300 DPI &middot; 5100&times;3300 px &middot; 9&times;12&Prime; image area</div>
</div>
<div class="info-panel" id="infoPanel">
  <div class="info-row">
    <div class="info-item"><span class="info-label">Token</span><span class="info-value" id="infoToken">&mdash;</span></div>
    <div class="info-item"><span class="info-label">Hash</span><span class="info-value" id="infoHash" style="font-family:'SF Mono','Fira Code',monospace;font-size:11px">&mdash;</span></div>
    <div class="info-item"><span class="info-label">Tribute</span><span class="info-value" id="infoTribute">&mdash;</span></div>
    <div class="info-item"><span class="info-label">Tribute ID</span><span class="info-value" id="infoTributeId">&mdash;</span></div>
    <div class="info-item"><span class="info-label">Orientation</span><span class="info-value" id="infoOrientation">&mdash;</span></div>
    <div class="info-item"><span class="info-label">Palette (HSB)</span><div class="palette-display" id="infoPalette"></div></div>
  </div>
</div>
<div class="status" id="status"></div>
<div class="preview-container"><canvas id="preview" style="display:none"></canvas></div>
</div>
<script>
// ============================================================
// DfaM Print Generator — 11×17" Print Layout (300 DPI)
// Canvas 2D port of on-chain p5.js script
// ============================================================

// ---- Color system (replaces p5.js color objects) ----
class Color {
    constructor(r, g, b, a) {
        this.r = Math.max(0, Math.min(255, r));
        this.g = Math.max(0, Math.min(255, g));
        this.b = Math.max(0, Math.min(255, b));
        this.a = (a !== undefined) ? a : 1.0;
        let hsb = _rgbToHsbInternal(this.r, this.g, this.b);
        this.h = hsb[0]; this.s = hsb[1]; this.br = hsb[2];
    }
    toCSS() {
        if (this.a < 1) return 'rgba('+Math.round(this.r)+','+Math.round(this.g)+','+Math.round(this.b)+','+this.a.toFixed(4)+')';
        return 'rgb('+Math.round(this.r)+','+Math.round(this.g)+','+Math.round(this.b)+')';
    }
}

function _rgbToHsbInternal(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    let max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h, s, br = max, d = max - min;
    s = max === 0 ? 0 : d / max;
    if (max === min) h = 0;
    else {
        if (max === r) h = (g < b) ? (g - b) / d + 6 : (g - b) / d;
        else if (max === g) h = (b - r) / d + 2;
        else h = (r - g) / d + 4;
        h /= 6;
    }
    return [Math.round(h * 360), Math.round(s * 100), Math.round(br * 100)];
}

function _hsbToRgbInternal(h, s, b) {
    h /= 360; s /= 100; b /= 100;
    let r, g, bl;
    let i = Math.floor(h * 6), f = h * 6 - i;
    let p = b * (1 - s), q = b * (1 - f * s), t = b * (1 - (1 - f) * s);
    switch (i % 6) {
        case 0: r=b;g=t;bl=p;break; case 1: r=q;g=b;bl=p;break;
        case 2: r=p;g=b;bl=t;break; case 3: r=p;g=q;bl=b;break;
        case 4: r=t;g=p;bl=b;break; default: r=b;g=p;bl=q;
    }
    return [Math.round(r*255), Math.round(g*255), Math.round(bl*255)];
}

// p5.js compatibility layer
let _colorMode = 'HSB';
function colorMode(m) { _colorMode = m; }
function color(a, b, c) {
    if (Array.isArray(a)) return color(a[0], a[1], a[2]);
    if (_colorMode === 'HSB') { let rgb = _hsbToRgbInternal(a, b, c); return new Color(rgb[0], rgb[1], rgb[2]); }
    return new Color(a, b, c);
}
function red(c) { return c.r; }
function green(c) { return c.g; }
function blue(c) { return c.b; }
function hue(c) { return c.h; }
function saturation(c) { return c.s; }
function brightness(c) { return c.br; }

// ---- Math helpers ----
function lerp(a, b, t) { return a + (b - a) * t; }
function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1)); }

// ---- PRNG (exact copy from on-chain) ----
class Random {
    constructor(td) {
        this.useA = false;
        let sfc32 = function(uint128Hex) {
            let a = parseInt(uint128Hex.substr(0, 8), 16);
            let b = parseInt(uint128Hex.substr(8, 8), 16);
            let c = parseInt(uint128Hex.substr(16, 8), 16);
            let d = parseInt(uint128Hex.substr(24, 8), 16);
            return function() {
                a |= 0; b |= 0; c |= 0; d |= 0;
                let t = (((a + b) | 0) + d) | 0;
                d = (d + 1) | 0;
                a = b ^ (b >>> 9);
                b = (c + (c << 3)) | 0;
                c = (c << 21) | (c >>> 11);
                c = (c + t) | 0;
                return (t >>> 0) / 4294967296;
            };
        };
        this.prngA = new sfc32(td.substr(2, 32));
        this.prngB = new sfc32(td.substr(34, 32));
        for (let i = 0; i < 1e6; i += 2) { this.prngA(); this.prngB(); }
    }
    random_dec() { this.useA = !this.useA; return this.useA ? this.prngA() : this.prngB(); }
    random_num(a, b) { return a + (b - a) * this.random_dec(); }
    random_int(a, b) { return Math.floor(this.random_num(a, b + 1)); }
    random_bool(p) { return this.random_dec() < p; }
    random_choice(list) { return list[this.random_int(0, list.length - 1)]; }
}

// ---- Color math functions (from on-chain) ----
function hsbToRgb(h, s, b) { return _hsbToRgbInternal(h, s, b); }
function rgbToHsb(r, g, b) { return _rgbToHsbInternal(r, g, b); }

function rgbToLab(c) {
    let r = red(c)/255, g = green(c)/255, b = blue(c)/255;
    r = r > 0.04045 ? Math.pow((r+0.055)/1.055, 2.4) : r/12.92;
    g = g > 0.04045 ? Math.pow((g+0.055)/1.055, 2.4) : g/12.92;
    b = b > 0.04045 ? Math.pow((b+0.055)/1.055, 2.4) : b/12.92;
    let x = (r*0.4124+g*0.3576+b*0.1805)*100;
    let y = (r*0.2126+g*0.7152+b*0.0722)*100;
    let z = (r*0.0193+g*0.1192+b*0.9505)*100;
    x /= 95.047; y /= 100; z /= 108.883;
    x = x > 0.008856 ? Math.pow(x, 1/3) : (7.787*x)+16/116;
    y = y > 0.008856 ? Math.pow(y, 1/3) : (7.787*y)+16/116;
    z = z > 0.008856 ? Math.pow(z, 1/3) : (7.787*z)+16/116;
    return [(116*y)-16, 500*(x-y), 200*(y-z)];
}

function labToRgb(a) {
    let cl=a[0],ca=a[1],cb=a[2];
    let y=(cl+16)/116, x=ca/500+y, z=y-cb/200;
    y = Math.pow(y,3)>0.008856 ? Math.pow(y,3) : (y-16/116)/7.787;
    x = Math.pow(x,3)>0.008856 ? Math.pow(x,3) : (x-16/116)/7.787;
    z = Math.pow(z,3)>0.008856 ? Math.pow(z,3) : (z-16/116)/7.787;
    x*=95.047; y*=100; z*=108.883;
    let r=(x*3.2406+y*-1.5372+z*-0.4986)/100;
    let g=(x*-0.9689+y*1.8758+z*0.0415)/100;
    let b=(x*0.0557+y*-0.2040+z*1.0570)/100;
    r = r>0.0031308 ? 1.055*Math.pow(r,1/2.4)-0.055 : 12.92*r;
    g = g>0.0031308 ? 1.055*Math.pow(g,1/2.4)-0.055 : 12.92*g;
    b = b>0.0031308 ? 1.055*Math.pow(b,1/2.4)-0.055 : 12.92*b;
    return color(Math.round(r*255), Math.round(g*255), Math.round(b*255));
}

function betterLerp(col1, col2, t) {
    let a1=rgbToLab(col1), a2=rgbToLab(col2);
    return labToRgb([a1[0]+t*(a2[0]-a1[0]), a1[1]+t*(a2[1]-a1[1]), a1[2]+t*(a2[2]-a1[2])]);
}

function betterLerpHSB(hsb1, hsb2, amount) {
    let rgb1=hsbToRgb(hsb1[0],hsb1[1],hsb1[2]);
    let rgb2=hsbToRgb(hsb2[0],hsb2[1],hsb2[2]);
    colorMode('RGB');
    let c1=color(rgb1[0],rgb1[1],rgb1[2]);
    let c2=color(rgb2[0],rgb2[1],rgb2[2]);
    let c=betterLerp(c1,c2,amount);
    let r=red(c),g=green(c),b=blue(c);
    let result=rgbToHsb(r,g,b);
    colorMode('HSB');
    return result;
}

function paintColor(h, s, b) {
    let p=[[5,89,84],[9,82,93],[25,95,100],[33,100,100],[56,100,100],[70,80,86],[138,78,77],[175,99,71],[187,100,77],[195,70,90],[219,97,78],[325,85,72],[354,92,74]];
    let k=[240,3,13], w=[40,1,99];
    let c;
    if (h < p[0][0]) {
        let t=(h+360-p[p.length-1][0])/(360-p[p.length-1][0]+p[0][0]);
        let c1=color(p[p.length-1][0],p[p.length-1][1],p[p.length-1][2]);
        let c2=color(p[0][0],p[0][1],p[0][2]);
        colorMode('RGB'); c=betterLerp(c1,c2,t); colorMode('HSB');
    } else if (h > p[p.length-1][0]) {
        let t=(h-p[p.length-1][0])/(360-p[p.length-1][0]+p[0][0]);
        let c1=color(p[p.length-1][0],p[p.length-1][1],p[p.length-1][2]);
        let c2=color(p[0][0],p[0][1],p[0][2]);
        colorMode('RGB'); c=betterLerp(c1,c2,t); colorMode('HSB');
    } else {
        let index=0;
        while(index<p.length-1 && !(h>=p[index][0] && h<=p[index+1][0])) index++;
        let t=(h-p[index][0])/(p[index+1][0]-p[index][0]);
        let h1=color(p[index]); let h2=color(p[index+1]);
        colorMode('RGB'); c=betterLerp(h1,h2,t); colorMode('HSB');
    }
    let maxw=saturation(c), maxk=brightness(c);
    let f=(s/100)*(b/100);
    let s1=w[1]+(s/100)*(100-w[1]);
    let b1=k[2]+(b/100)*(w[2]-k[2]);
    let s2=w[1]+(s/100)*(maxw-w[1]);
    let b2=k[2]+(b/100)*(maxk-k[2]);
    let news=s1+f*(s2-s1);
    let newb=b1+f*(b2-b1);
    return color(h, news, newb);
}

function scramble(array) {
    let shuffled = array;
    for (let i = shuffled.length - 1; i > 0; i--) {
        let j = R.random_int(0, i);
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
}

// ---- Global state ----
let R; // PRNG - set before tributes color fns are called
let tokenData; // global hash

let tributes = [
    {
        id: 0,
        title: "Chromie Squiggle",
        colors: function() {
            let colors = [];
            let h = R.random_int(0, 360);
            let s = R.random_int(4, 8);
            let d = R.random_choice([-1, 1]);
            for (let i = 0; i < s; i++) {
                colors.push([(h + (i * 30 * d) + 360) % 360, 100, 100]);
            }
            return colors;
        }
    },
    {
        id: 1,
        title: "Genesis",
        colors: function() {
            let bg = [R.random_int(0, 360), R.random_int(55, 100), R.random_int(80, 100)];
            let p1 = [R.random_int(0, 360), R.random_int(55, 100), R.random_int(80, 100)];
            while (Math.min(Math.abs(p1[0] - bg[0]), 360 - Math.abs(p1[0] - bg[0])) < 60) {
                p1[0] = R.random_int(0, 360);
            }
            let p2 = [R.random_int(0, 360), R.random_int(55, 100), R.random_int(80, 100)];
            while (Math.min(Math.abs(p2[0] - p1[0]), 360 - Math.abs(p2[0] - p1[0])) < 60) {
                p2[0] = R.random_int(0, 360);
            }
            let c1 = betterLerpHSB(bg, p1, 0.4);
            let c2 = betterLerpHSB(c1, p1, 0.4);
            let c3 = betterLerpHSB(c2, p2, 0.5);
            let colors = [bg, c1, c2, c3];
            return colors;
        }
    },
    {
        id: 2,
        title: "Construction Token",
        colors: function() {
            let h = R.random_int(0, 360);
            let v = R.random_int(15, 35);
            let colors = [[h, v, 100], [h, 100, 100], [h, 100, v]];
            colors = scramble(colors);
            return colors;
        }
    },
    {
        id: 3,
        title: "Dynamic Slices",
        colors: function() {
            let choices = [
                [[0, 100, 100], [172, 100, 63], [43, 100, 95], [32, 100, 98], [193, 57, 84]],
                [[329, 30, 90], [231, 20, 97], [10, 29, 85], [219, 46, 83]],
                [[339, 73, 69], [4, 68, 92], [318, 66, 45]],
                [[0, 0, 21], [340, 90, 91], [0, 0, 91]],
                [[240, 100, 1], [328, 93, 80], [0, 0, 91]],
                [[60, 14, 100], [240, 14, 82], [0, 0, 91]],
                [[247, 49, 64], [300, 36, 84], [274, 50, 79]],
                [[240, 100, 1], [348, 100, 100], [0, 0, 91]]
            ];
            let colors = R.random_choice(choices);
            colors = scramble(colors);
            return colors;
        }
    },
    {
        id: 4,
        title: "Cryptoblots",
        colors: function() {
            let choices = [
                [200, 26, 22],
                [210, 25, 40],
                [205, 55, 93],
                [230, 64, 82],
                [222, 90, 65],
                [205, 79, 91],
                [218, 67, 37],
                [207, 70, 92],
                [75, 98, 51],
                [120, 76, 55],
                [109, 48, 76],
                [157, 100, 62],
                [90, 20, 94],
                [150, 60, 78],
                [350, 85, 77],
                [350, 100, 59],
                [348, 91, 86],
                [10, 54, 98],
                [0, 86, 90],
                [350, 100, 90],
                [325, 98, 40],
                [267, 52, 66],
                [302, 49, 85],
                [301, 100, 53],
                [305, 68, 45],
                [300, 12, 85],
                [60, 20, 100],
                [60, 96, 93],
                [60, 40, 100],
                [51, 100, 100],
                [37, 72, 91],
                [56, 100, 100],
                [21, 30, 62],
                [60, 10, 96],
                [8, 64, 58],
                [31, 100, 48],
                [21, 44, 20],
                [38, 26, 76]
            ];
            let colors = [[0, 0, 0]];
            let c = R.random_choice(choices);
            let str;
            if (c[2] > 66) {
                str = [c[0], c[1], c[2] * 0.7];
            } else {
                str = [c[0], c[1], Math.min(c[2] * 2.75, 100)];
            }
            colors.push(c);
            colors.push(str);
            return colors;
        }
    },
    {
        id: 5,
        title: "Elevated Deconstructions",
        colors: function() {
            let h = R.random_int(0, 360);
            let s = R.random_int(5, 50);
            let b = R.random_int(90, 100);
            let p1 = [h, s, b];
            let c1 = [h, s, b * 0.89];
            let c2 = [h, s, b * 0.78];
            let colors = [p1, c1, c2];
            return colors;
        }
    },
    {
        id: 6,
        title: "Singularity",
        colors: function() {
            let bg = [0, 0, 0];
            let p1 = [52, 16, 100];
            let sa = R.random_dec();
            let choices = [
                [[24, 53, 100], [339, 92, 74], [264, 83, 24]],
                [[161, 19, 100], [214, 56, 65], [163, 87, 49]],
                [[105, 59, 82], [174, 79, 44], [288, 99, 27]],
                [[183, 92, 87], [111, 32, 75], [298, 94, 50]]
            ];
            let c = R.random_choice(choices);
            let c1 = betterLerpHSB(c[0], p1, sa);
            let c2 = betterLerpHSB(c[1], p1, sa);
            let c3 = betterLerpHSB(c[2], p1, sa);
            c2 = betterLerpHSB(c2, bg, 0.3);
            c3 = betterLerpHSB(c3, bg, 0.6);
            let colors = [bg, c1, c2, c3];
            return colors;
        }
    },
    {
        id: 7,
        title: "Ignition",
        colors: function() {
            let colors = [];
            let h = R.random_int(0, 360);
            if (R.random_bool(0.5)) {
                colors.push([(h + 180) % 360, 52, 67]);
                colors.push([h, 70, 100]);
                colors.push([h + 30, 70, 100]);
                colors.push([0, 0, 40]);
            } else {
                colors.push([0, 0, 0]);
                colors.push([h, 70, 100]);
                for (let i = 1; i < 3; i++) {
                    colors.push([(h + (i * 30)) % 360, 70, 100]);
                }
            }
            return colors;
        }
    },
    {
        id: 8,
        title: "NimBuds",
        colors: function() {
            let colors = [[344, 58, 95], [186, 84, 85], [158, 67, 85], [45, 84, 95]];
            colors = scramble(colors);
            return colors;
        }
    },
    {
        id: 9,
        title: "HyperHash",
        colors: function() {
            let h = R.random_int(0, 360);
            let colors = [[0, 0, 32]];
            let d = R.random_choice([-1, 1]);
            for (let i = 0; i < R.random_int(2, 4); i++) {
                colors.push([(h + (i * 22 * d)) % 360, 70, 100]);
            }
            return colors;
        }
    },
    {
        id: 10,
        title: "Unigrids",
        colors: function() {
            let choices = [
                [[96, 33, 6], [339, 87, 100], [61, 93, 100], [172, 72, 92]],
                [[195, 82, 37], [162, 82, 58], [133, 36, 83], [104, 12, 85], [42, 14, 95]],
                [[235, 35, 26], [218, 19, 68], [197, 8, 96], [353, 85, 94]],
                [[355, 75, 90], [105, 10, 98], [182, 24, 86], [203, 56, 62], [215, 67, 34]],
                [[333, 85, 97], [295, 95, 72], [258, 93, 64], [229, 72, 93], [194, 68, 94]],
                [[201, 100, 29], [0, 81, 84], [31, 100, 97], [40, 71, 99], [51, 22, 92]],
                [[225, 57, 25], [213, 46, 42], [179, 53, 75], [171, 56, 100]],

let ctx; // global canvas context

// pencilLineDraw kept for PRNG advancement during layout computation
function pencilLineDraw(x1, y1, x2, y2, c, tu) {
    let ud=tu, od=tu, minw=0.55*tu, maxw=0.75*tu;
    let d=0.8, of=0.2, range=0.4, mina=0, maxa=1, mins=0.3*tu, maxs=tu;
    let sx=x1, sy=y1, ex=x2, ey=y2;
    let v=R.random_num(-ud, od);
    if (Math.abs(x2-x1) > Math.abs(y2-y1)) {
        if (x2>x1) { sx=x1-v; ex=x2+v; } else { sx=x1+v; ex=x2-v; }
    } else {
        if (y2>y1) { sy=y1-v; ey=y2+v; } else { sy=y1+v; ey=y2-v; }
    }
    let sw=R.random_num(minw, maxw);
    let l=dist(sx,sy,ex,ey);
    let n=Math.floor(l*d);
    for (let i=0; i<n; i++) {
        let t=R.random_dec();
        let x=lerp(sx,ex,t), y=lerp(sy,ey,t);
        let dx=ex-sx, dy=ey-sy;
        let offset=sw*of+R.random_num(0, sw*range);
        let side=R.random_choice([1,-1]);
        let ppx=side*(-dy/l), ppy=side*(dx/l);
        x+=ppx*offset; y+=ppy*offset;
        let a=R.random_num(mina, maxa);
        let rx=R.random_num(mins,maxs), ry=R.random_num(mins,maxs);
    }
}

// outlineLineDraw kept for PRNG advancement
function outlineLineDraw(x1, y1, x2, y2, c, tu) {
    let ud=1.7*tu, od=0.7*tu, minw=1.8*tu, maxw=2.2*tu;
    let d=4, of=0.2, range=0.4, mina=0.25, maxa=0.35, mins=0.3*tu, maxs=0.7*tu;
    let sx=x1, sy=y1, ex=x2, ey=y2;
    let v=R.random_num(-ud, od);
    if (Math.abs(x2-x1) > Math.abs(y2-y1)) {
        if (x2>x1) { sx=x1-v; ex=x2+v; } else { sx=x1+v; ex=x2-v; }
    } else {
        if (y2>y1) { sy=y1-v; ey=y2+v; } else { sy=y1+v; ey=y2-v; }
    }
    let sw=R.random_num(minw, maxw);
    let l=dist(sx,sy,ex,ey);
    let n=Math.floor(l*d);
    for (let i=0; i<n; i++) {
        let t=R.random_dec();
        let x=lerp(sx,ex,t), y=lerp(sy,ey,t);
        let dx=ex-sx, dy=ey-sy;
        let offset=sw*of+R.random_num(0, sw*range);
        let side=R.random_choice([1,-1]);
        let ppx=side*(-dy/l), ppy=side*(dx/l);
        x+=ppx*offset; y+=ppy*offset;
        let a=R.random_num(mina, maxa);
        let rx=R.random_num(mins,maxs), ry=R.random_num(mins,maxs);
    }
}

// ---- Layout functions (from on-chain) ----

function processEndcaps(ra, hrz, dbl, ecs, beg) {
    let adj = [], current = [0];
    for (let i = 1; i < ra.length; i++) {
        let [ppx, ppy, ppw, pph] = ra[i-1];
        let [cx, cy, cw, ch] = ra[i];
        let adjacent = hrz ? (cy === ppy + pph) : (cx === ppx + ppw);
        if (adjacent) current.push(i); else { adj.push(current); current = [i]; }
    }
    adj.push(current);
    let nra = [], ei = [];
    for (let i = 0; i < adj.length; i++) {
        let minx=ra[adj[i][0]][0], miny=ra[adj[i][0]][1];
        let maxx=ra[adj[i][0]][0]+ra[adj[i][0]][2], maxy=ra[adj[i][0]][1]+ra[adj[i][0]][3];
        for (let j=1; j<adj[i].length; j++) {
            if(ra[adj[i][j]][0]<minx) minx=ra[adj[i][j]][0];
            if(ra[adj[i][j]][1]<miny) miny=ra[adj[i][j]][1];
            if(ra[adj[i][j]][0]+ra[adj[i][j]][2]>maxx) maxx=ra[adj[i][j]][0]+ra[adj[i][j]][2];
            if(ra[adj[i][j]][1]+ra[adj[i][j]][3]>maxy) maxy=ra[adj[i][j]][1]+ra[adj[i][j]][3];
        }
        if (dbl || (!dbl && beg)) {
            let be = hrz ? [minx,miny,ecs,maxy-miny] : [minx,miny,maxx-minx,ecs];
            ei.push(nra.length);
            nra.push(be);
        }
        for (let j=0; j<adj[i].length; j++) {
            let [x, y, w, h] = ra[adj[i][j]];
            let mr;
            if (dbl) {
                mr = hrz ? [x+ecs, y, w-(2*ecs), h] : [x, y+ecs, w, h-(2*ecs)];
            } else if (beg) {
                mr = hrz ? [x+ecs, y, w-ecs, h] : [x, y+ecs, w, h-ecs];
            } else {
                mr = hrz ? [x, y, w-ecs, h] : [x, y, w, h-ecs];
            }
            nra.push(mr);
        }
        if (dbl || (!dbl && !beg)) {
            let ee = hrz ? [maxx-ecs,miny,ecs,maxy-miny] : [minx,maxy-ecs,maxx-minx,ecs];
            ei.push(nra.length);
            nra.push(ee);
        }
    }
    return { rectangles: nra, ei: ei };
}

function convertToLines(ra) {
    let hs = [], vs = [];
    for (let i = 0; i < ra.length; i++) {
        let [xu, yu, wu, hu] = ra[i];
        let top=false, bottom=false, left=false, right=false;
        for (let j=0; j<hs.length; j++) {
            if (hs[j][0]===yu) { hs[j][1].push([xu, xu+wu]); top=true; }
            if (hs[j][0]===yu+hu) { hs[j][1].push([xu, xu+wu]); bottom=true; }
        }
        if (!top) hs.push([yu, [[xu, xu+wu]]]);
        if (!bottom) hs.push([yu+hu, [[xu, xu+wu]]]);
        for (let j=0; j<vs.length; j++) {
            if (vs[j][0]===xu) { vs[j][1].push([yu, yu+hu]); left=true; }
            if (vs[j][0]===xu+wu) { vs[j][1].push([yu, yu+hu]); right=true; }
        }
        if (!left) vs.push([xu, [[yu, yu+hu]]]);
        if (!right) vs.push([xu+wu, [[yu, yu+hu]]]);
    }
    function mergeSegments(seg) {
        if (seg.length===0) return [];
        seg.sort((a,b) => a[0]-b[0]);
        let m = [seg[0]];
        for (let i=1; i<seg.length; i++) {
            let cur=seg[i], last=m[m.length-1];
            if (cur[0]<=last[1]) last[1]=Math.max(last[1],cur[1]); else m.push(cur);
        }
        return m;
    }
    let lines = [];
    for (let i=0; i<hs.length; i++) {
        let merged=mergeSegments(hs[i][1]);
        for (let j=0; j<merged.length; j++) lines.push([merged[j][0], hs[i][0], merged[j][1], hs[i][0]]);
    }
    for (let i=0; i<vs.length; i++) {
        let merged=mergeSegments(vs[i][1]);
        for (let j=0; j<merged.length; j++) lines.push([vs[i][0], merged[j][0], vs[i][0], merged[j][1]]);
    }
    return lines;
}


// ---- Main generation logic ----

let lastTokenNumber, lastHash;

function setStatus(msg, cls) {
    let el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (cls ? ' '+cls : '');
}

async function generate() {
    let tokenNum = parseInt(document.getElementById('tokenInput').value);
    if (isNaN(tokenNum) || tokenNum < 0 || tokenNum > 999) {
        setStatus('Please enter a token number between 0 and 999.', 'error');
        return;
    }

    document.getElementById('generateBtn').disabled = true;
    setStatus('Fetching token hash from Art Blocks...', 'generating');

    try {
        let fullTokenId = 3000000 + tokenNum;
        let query = JSON.stringify({
            query: '{ tokens_metadata(where: {project: {contract_address: {_eq: "0xababababab20053426ad1c782de9ea8444358070"}, project_id: {_eq: "3"}}, token_id: {_eq: "' + fullTokenId + '"}}) { hash } }'
        });

        let response = await fetch('https://data.artblocks.io/v1/graphql', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: query
        });

        if (!response.ok) throw new Error('API returned ' + response.status);

        let data = await response.json();
        if (!data.data || !data.data.tokens_metadata || data.data.tokens_metadata.length === 0) {
            throw new Error('Token #' + tokenNum + ' not found. Is it minted?');
        }

        let hashVal = data.data.tokens_metadata[0].hash;
        if (!hashVal || hashVal.length !== 66) {
            throw new Error('Invalid hash returned: ' + hashVal);
        }

        lastTokenNumber = tokenNum;
        lastHash = hashVal;

        setStatus('Initializing PRNG (1M warmup iterations)...', 'generating');

        setTimeout(function() {
            try {
                doGenerate(hashVal, tokenNum);
            } catch(e) {
                setStatus('Error: ' + e.message, 'error');
                console.error(e);
                document.getElementById('generateBtn').disabled = false;
            }
        }, 50);

    } catch(e) {
        setStatus('Error: ' + e.message, 'error');
        console.error(e);
        document.getElementById('generateBtn').disabled = false;
    }
}

function doGenerate(hashVal, tokenNum) {
    // Fixed canvas size: 11×17" landscape at 300 DPI
    let canvasW = 5100;
    let canvasH = 3300;

    // Image area: 12" wide × 9" tall = 3600×2700 px, centered
    let imageW = 3600;
    let imageH = 2700;
    let imageLeft = (canvasW - imageW) / 2;  // 750px = 2.5"
    let imageTop = (canvasH - imageH) / 2;   // 300px = 1"

    let showRegDots = document.getElementById('regDots').checked;

    // Set globals
    tokenData = hashVal;
    colorMode('HSB');
    R = new Random(tokenData);

    setStatus('Computing layout...', 'generating');

    // ---- Setup phase (mirrors on-chain setup()) ----
    // On-chain: the composition fits a 4:3 aspect ratio within the canvas.
    // pw/ph = the 4:3 container, u = pw/24.
    // For the print version, the image area IS the container.
    // imageW/imageH = 3600/2700 = 4:3 ✓
    // So: pw = imageW = 3600, ph = imageH = 2700, u = 3600/24 = 150

    // But we need to replicate the EXACT on-chain setup for PRNG sequence.
    // On-chain uses w/h of the canvas to compute pw/ph, then u.
    // We use the image area dimensions directly since they're 4:3.
    let w = imageW;
    let h = imageH;
    let pw, ph, px, py, u, tu;

    if (w/h > 4/3) {
        ph = h; pw = h * 4/3;
    } else {
        pw = w; ph = w * 3/4;
    }
    px = imageLeft;  // offset to image area on the print sheet
    py = imageTop;
    u = pw / 24;
    tu = u / 40;

    colorMode('HSB');
    let paper = color(32, 5, 97);
    let pencil = color(0, 0, 75);
    let crayon = color(0, 0, 26);

    let project = R.random_choice(tributes);
    // Replicate exact PRNG behavior: colors() called twice
    let colors = project.colors().slice(0, Math.min(project.colors().length, R.random_int(5, 8)));
    let rc = [];
    for (let i = 0; i < colors.length; i++) {
        rc.push([Math.round(colors[i][0]), Math.round(colors[i][1]), Math.round(colors[i][2])]);
    }

    let palette = colors.map(function(cv) { return paintColor(cv[0], cv[1], cv[2]); });

    let extension = 0.5 * R.random_choice([1, 1, 2]);
    let margin = 2 + extension;
    let aw = 24 - 2 * margin;
    let ah = 18 - 2 * margin;
    let horizontal = R.random_bool(0.4);
    let r;
    if (horizontal) r = R.random_int(5, 12);
    else r = R.random_int(5, 18);

    let rt = R.random_int(1, 3);
    let rx, ry, rw, rh;
    if (horizontal) {
        rw = aw; rh = Math.min(rt, Math.floor(ah / r));
        rx = margin; ry = margin + (ah - r * rh) / 2;
    } else {
        rh = ah; rw = Math.min(rt, Math.floor(aw / r));
        rx = margin + (aw - r * rw) / 2; ry = margin;
    }
    let rbase = [rx, ry, rw, rh];
    let merge = R.random_bool(0.5);
    let skip = R.random_bool(0.5);
    let process_flag = R.random_bool(0.75);
    let subdivision = R.random_bool(0.4);
    let doublecap = R.random_bool(0.3);
    let alternate = R.random_bool(0.5);
    let symmetry = R.random_bool(0.2);
    let partial = R.random_bool(0.4);
    let random_flag = R.random_bool(0.1);
    let consecutive = R.random_bool(0.5);

    // ---- Draw phase (mirrors on-chain draw()) ----
    // Setup canvas
    let canvas = document.getElementById('preview');
    canvas.width = canvasW;
    canvas.height = canvasH;
    canvas.style.display = 'block';
    ctx = canvas.getContext('2d');

    // DO NOT fill background — canvas defaults to transparent/white

    // Handle rotation — consume the PRNG call
    let rotated = R.random_bool(0.5);

    let pr = [], or_arr = [], sg = [], ei = [], mr = [], si = [], sr = [], sd = [], pnt = [];
    let [bx, by, bw, bh] = rbase;

    for (let i = 0; i < r; i++) {
        let rectangle;
        if (horizontal) rectangle = [bx, by + i * bh, bw, bh];
        else rectangle = [bx + i * bw, by, bw, bh];
        or_arr.push([...rectangle]);
        pr.push([...rectangle]);
    }

    // Merge logic
    let mi = -1, ma = 0, cc = or_arr.length;
    if (merge && cc > 6) {
        if (symmetry) {
            let maxr = cc - 4, minr = 2;
            if (cc % 2 === 1) {
                if (minr % 2 === 0) minr++;
                if (maxr % 2 === 0) maxr--;
            } else {
                if (minr % 2 === 1) minr++;
                if (maxr % 2 === 1) maxr--;
            }
            if (minr <= maxr) {
                ma = minr + R.random_int(0, Math.floor((maxr - minr) / 2)) * 2;
                mi = Math.floor((cc - ma) / 2);
            }
        } else {
            ma = R.random_int(2, cc - 4);
            mi = R.random_int(0, cc - ma);
        }
    }
    if (mi >= 0) {
        if (horizontal) mr = [bx, by + mi * bh, bw, ma * bh];
        else mr = [bx + mi * bw, by, ma * bw, bh];
        pr.splice(mi, ma, [...mr]);
        or_arr.splice(mi, ma, [...mr]);
    }

    // Skip / alternate logic
    if (!merge && r % 2 === 1 && or_arr.length >= 7 && alternate) {
        for (let i = 1; i < or_arr.length; i += 2) {
            si.push(i); sr.push(or_arr[i]);
        }
        si.sort((a, b) => b - a);
        for (let i = 0; i < si.length; i++) or_arr.splice(si[i], 1);
        si.sort((a, b) => a - b);
    } else if (skip && or_arr.length > 4) {
        if (symmetry) {
            let ns = 0;
            if (Math.floor((or_arr.length - 4) / 2) > 0) ns = R.random_int(1, Math.floor((or_arr.length - 4) / 2));
            let ai = [];
            for (let i = 1; i < Math.floor((or_arr.length - 1) / 2); i++) ai.push(i);
            let ci = [];
            for (let s = 0; s < ns && ai.length > 0; s++) {
                let sk = ai[R.random_int(0, ai.length - 1)];
                ci.push(sk);
                let fai = [];
                for (let j = 0; j < ai.length; j++) {
                    if (ai[j] !== sk && ai[j] !== sk - 1 && ai[j] !== sk + 1) fai.push(ai[j]);
                }
                ai = fai;
            }
            for (let i = 0; i < ci.length; i++) {
                si.push(ci[i]); sr.push(or_arr[ci[i]]);
                let mirror = or_arr.length - 1 - ci[i];
                if (mirror !== ci[i] && mirror >= 0 && mirror < or_arr.length) {
                    si.push(mirror); sr.push(or_arr[mirror]);
                }
            }
            si.sort((a, b) => b - a);
            for (let i = 0; i < si.length; i++) or_arr.splice(si[i], 1);
            si.sort((a, b) => a - b);
        } else {
            let ai = [];
            for (let i = 1; i < or_arr.length - 1; i++) ai.push(i);
            for (let s = 0; s < R.random_int(1, Math.min(3, or_arr.length - 4)); s++) {
                if (ai.length > 0) {
                    let sk = ai[R.random_int(0, ai.length - 1)];
                    si.push(sk); sr.push(or_arr[sk]);
                    let fai = [];
                    for (let j = 0; j < ai.length; j++) {
                        if (ai[j] !== sk && ai[j] !== sk - 1 && ai[j] !== sk + 1) fai.push(ai[j]);
                    }
                    ai = fai;
                }
            }
            si.sort((a, b) => b - a);
            for (let i = 0; i < si.length; i++) or_arr.splice(si[i], 1);
            si.sort((a, b) => a - b);
        }
    }

    // Process / subdivision / endcap logic
    if (process_flag || or_arr.length < 5) {
        if (symmetry && or_arr.length % 2 === 0) subdivision = false;
        if (subdivision) {
            let sub;
            if (symmetry) sub = Math.floor((or_arr.length - 1) / 2);
            else sub = R.random_int(0, or_arr.length - 1);
            let us = sub;
            for (let i = 0; i < si.length; i++) { if (sub >= si[i]) us++; }
            let [sx, sy, sw, sh] = or_arr[sub];
            let sa, sb;
            if (horizontal) { sa = sx; sb = sw; }
            else { sa = sy; sb = sh; }
            let dv = [];
            for (let i = 2; i <= sb; i++) {
                if (sb % i === 0) dv.push([sb / i, i]);
            }
            let di = dv[R.random_int(0, dv.length - 1)];
            for (let i = 0; i < di[1]; i++) {
                if (horizontal) sd.push([sa, sy, di[0], sh]);
                else sd.push([sx, sa, sw, di[0]]);
                sa += di[0];
            }
            pr.splice(us, 1);
            for (let i = 0; i < sd.length; i++) pr.splice(us + i, 0, [...sd[i]]);
            or_arr.splice(sub, 1, ...sd);
            let sdi = [];
            for (let i = 0; i < sd.length; i++) sdi.push(sub + i);
            sg.push(sdi);
        } else {
            let emax, esize;
            if (symmetry) doublecap = true;
            if (horizontal) {
                emax = doublecap ? Math.floor(bw / 3) : Math.floor(bw / 2);
            } else {
                emax = doublecap ? Math.floor(bh / 3) : Math.floor(bh / 2);
            }
            esize = R.random_int(1, Math.max(1, emax));
            let beginning = R.random_bool(0.5);
            let prp = processEndcaps(pr, horizontal, doublecap, esize, beginning);
            pr = prp.rectangles;
            let orp = processEndcaps(or_arr, horizontal, doublecap, esize, beginning);
            or_arr = orp.rectangles;
            ei = orp.ei;
        }
    }

    // Compute bounds
    let left = pr[0][0], right = pr[0][0] + pr[0][2];
    let top = pr[0][1], bottom = pr[0][1] + pr[0][3];
    for (let i = 1; i < pr.length; i++) {
        if (pr[i][0] < left) left = pr[i][0];
        if (pr[i][0] + pr[i][2] > right) right = pr[i][0] + pr[i][2];
        if (pr[i][1] < top) top = pr[i][1];
        if (pr[i][1] + pr[i][3] > bottom) bottom = pr[i][1] + pr[i][3];
    }
    let dw = right - left, dh = bottom - top;

    // Convert to pencil lines (needed for registration dots)
    let ul = convertToLines(pr);

    // Add skip rectangle guide lines
    for (let i = 0; i < sr.length; i++) {
        let [gx, gy, gw, gh] = sr[i];
        if (horizontal) {
            ul.push([left, gy, right, gy]);
            ul.push([left, gy + gh, right, gy + gh]);
        } else {
            ul.push([gx, top, gx, bottom]);
            ul.push([gx + gw, top, gx + gw, bottom]);
        }
    }

    // Extend lines
    for (let i = 0; i < ul.length; i++) {
        let [x1, y1, x2, y2] = ul[i];
        if (y1 === y2 && (x2 - x1) === dw) ul[i] = [x1 - extension, y1, x2 + extension, y2];
        else if (x1 === x2 && (y2 - y1) === dh) ul[i] = [x1, y1 - extension, x2, y2 + extension];
    }

    // Color assignment
    let np = Math.min(palette.length, or_arr.length);
    if (random_flag) {
        let ar = [];
        for (let i = 0; i < or_arr.length; i++) {
            let [xu, yu, wu, hu] = or_arr[i];
            if (!(si.length > 0 && doublecap && ei.includes(i)) && wu * hu < 40) ar.push([i, [xu, yu, wu, hu]]);
        }
        ar = scramble(ar);
        let selected = ar.slice(0, Math.min(np, ar.length));
        selected.sort((a, b) => a[0] - b[0]);
        for (let i = 0; i < selected.length; i++) {
            let [xu, yu, wu, hu] = selected[i][1];
            pnt.push([xu, yu, wu, hu, palette[i]]);
        }
    } else if (consecutive && ei.length === 0) {
        let sti = R.random_int(0, Math.max(0, or_arr.length - (np + 2)));
        let ri = sti, cli = 0;
        while (cli < np && ri < or_arr.length) {
            let [xu, yu, wu, hu] = or_arr[ri];
            if (wu * hu < 40) { pnt.push([xu, yu, wu, hu, palette[cli]]); cli++; }
            ri++;
        }
        if (cli < np && sti > 0) {
            ri = Math.max(0, sti - np + cli);
            cli = 0; pnt = [];
            while (cli < np && ri < or_arr.length) {
                let [xu, yu, wu, hu] = or_arr[ri];
                if (wu * hu < 40) { pnt.push([xu, yu, wu, hu, palette[cli]]); cli++; }
                ri++;
            }
        }
    } else {
        let ora = [];
        for (let i = 0; i < or_arr.length; i++) {
            let [xu, yu, wu, hu] = or_arr[i];
            if (!(si.length > 0 && doublecap && ei.includes(i)) && wu * hu < 40) ora.push([i, [xu, yu, wu, hu]]);
        }
        ora.sort((a, b) => a[1][2] * a[1][3] - b[1][2] * b[1][3]);
        for (let i = 0; i < Math.min(np, ora.length); i++) {
            let [xu, yu, wu, hu] = ora[i][1];
            if (wu * hu < 40) pnt.push([xu, yu, wu, hu, palette[i]]);
        }
    }

    // Determine outline rectangles (needed for PRNG sequence fidelity)
    let ol;
    if (partial) {
        let pc = [];
        for (let i = 0; i < pnt.length; i++) pc.push([pnt[i][0], pnt[i][1], pnt[i][2], pnt[i][3]]);
        let ecp = false, nep = false;
        if (ei.length > 0) {
            for (let i = 0; i < or_arr.length; i++) {
                let [xu, yu, wu, hu] = or_arr[i];
                let rp = false;
                for (let j = 0; j < pc.length; j++) {
                    if (pc[j][0]===xu && pc[j][1]===yu && pc[j][2]===wu && pc[j][3]===hu) rp = true;
                }
                if (rp) { if (ei.includes(i)) ecp = true; else nep = true; }
            }
        }
        if (ecp && nep) ol = or_arr;
        else if (ecp && !nep && ei.length > 0) {
            ol = [];
            for (let i = 0; i < or_arr.length; i++) { if (ei.includes(i)) ol.push([...or_arr[i]]); }
        } else if (!ecp && nep && ei.length > 0) {
            ol = [];
            for (let i = 0; i < or_arr.length; i++) { if (!ei.includes(i)) ol.push([...or_arr[i]]); }
        } else {
            if (subdivision && sg.length > 0) {
                let nr = [];
                let sdp = false;
                for (let i = 0; i < sg.length; i++) {
                    for (let j = 0; j < sg[i].length; j++) {
                        if (sg[i][j] < or_arr.length) {
                            let [xu, yu, wu, hu] = or_arr[sg[i][j]];
                            let rp = false;
                            for (let k = 0; k < pc.length; k++) {
                                if (pc[k][0]===xu && pc[k][1]===yu && pc[k][2]===wu && pc[k][3]===hu) rp = true;
                            }
                            if (rp) sdp = true;
                        }
                    }
                }
                if (sdp) {
                    for (let i = 0; i < sg.length; i++) {
                        for (let j = 0; j < sg[i].length; j++) {
                            if (sg[i][j] < or_arr.length) {
                                let [xu, yu, wu, hu] = or_arr[sg[i][j]];
                                let rp = false;
                                for (let k = 0; k < pc.length; k++) {
                                    if (pc[k][0]===xu && pc[k][1]===yu && pc[k][2]===wu && pc[k][3]===hu) rp = true;
                                }
                                if (!rp) nr.push([xu, yu, wu, hu]);
                            }
                        }
                    }
                }
                ol = [...pc, ...nr];
            } else {
                ol = pc;
            }
        }
    } else {
        ol = or_arr;
    }

    let olc = convertToLines(ol);

    // ========================================
    // RENDERING — Print-specific (no texture)
    // ========================================

    setStatus('Rendering...', 'generating');

    setTimeout(function() {
        // If rotated, apply 180° rotation around image center
        if (rotated) {
            ctx.translate(canvasW, canvasH);
            ctx.rotate(Math.PI);
        }

        // Draw paint rectangles as flat solid fills (no texture)
        for (let i = 0; i < pnt.length; i++) {
            let [xu, yu, wu, hu, col] = pnt[i];
            ctx.fillStyle = col.toCSS();
            ctx.fillRect(xu * u + px, yu * u + py, wu * u, hu * u);
        }

        // Reset transform before drawing trim marks and dots
        if (rotated) {
            ctx.setTransform(1, 0, 0, 1, 0, 0);
        }

        // ---- Trim marks ----
        // Standard printer's corner trim marks at the 9×12" image boundary
        let trimLen = 75;  // 0.25" at 300 DPI
        let trimGap = 0;   // marks start right at the corner
        ctx.strokeStyle = 'rgba(0,0,0,0.30)';
        ctx.lineWidth = 1;
        ctx.setLineDash([]);

        // Top-left corner
        ctx.beginPath();
        ctx.moveTo(imageLeft - trimLen, imageTop); ctx.lineTo(imageLeft - 1, imageTop);
        ctx.moveTo(imageLeft, imageTop - trimLen); ctx.lineTo(imageLeft, imageTop - 1);
        ctx.stroke();

        // Top-right corner
        ctx.beginPath();
        ctx.moveTo(imageLeft + imageW + 1, imageTop); ctx.lineTo(imageLeft + imageW + trimLen, imageTop);
        ctx.moveTo(imageLeft + imageW, imageTop - trimLen); ctx.lineTo(imageLeft + imageW, imageTop - 1);
        ctx.stroke();

        // Bottom-left corner
        ctx.beginPath();
        ctx.moveTo(imageLeft - trimLen, imageTop + imageH); ctx.lineTo(imageLeft - 1, imageTop + imageH);
        ctx.moveTo(imageLeft, imageTop + imageH + 1); ctx.lineTo(imageLeft, imageTop + imageH + trimLen);
        ctx.stroke();

        // Bottom-right corner
        ctx.beginPath();
        ctx.moveTo(imageLeft + imageW + 1, imageTop + imageH); ctx.lineTo(imageLeft + imageW + trimLen, imageTop + imageH);
        ctx.moveTo(imageLeft + imageW, imageTop + imageH + 1); ctx.lineTo(imageLeft + imageW, imageTop + imageH + trimLen);
        ctx.stroke();

        // ---- Registration dots ----
        if (showRegDots) {
            ctx.fillStyle = 'rgba(0,0,0,0.20)';
            let dotR = 3;

            // Collect all unique endpoints from pencil lines (ul) and outline lines (olc)
            let endpoints = new Set();
            function addPt(x, y) {
                // Convert unit coords to canvas coords
                let cx, cy;
                if (rotated) {
                    // When rotated, the composition is flipped 180° around center
                    cx = canvasW - (x * u + px);
                    cy = canvasH - (y * u + py);
                } else {
                    cx = x * u + px;
                    cy = y * u + py;
                }
                let key = Math.round(cx) + ',' + Math.round(cy);
                if (!endpoints.has(key)) {
                    endpoints.add(key);
                    ctx.beginPath();
                    ctx.arc(cx, cy, dotR, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < ul.length; i++) {
                addPt(ul[i][0], ul[i][1]);
                addPt(ul[i][2], ul[i][3]);
            }
        }

        // Update info panel
        document.getElementById('infoToken').textContent = '#' + tokenNum;
        document.getElementById('infoHash').textContent = hashVal.substring(0, 18) + '...';
        document.getElementById('infoTribute').textContent = project.title;
        document.getElementById('infoTributeId').textContent = '#' + project.id;
        document.getElementById('infoOrientation').textContent = horizontal ? 'Horizontal' : 'Vertical';

        let paletteEl = document.getElementById('infoPalette');
        paletteEl.innerHTML = '';
        for (let i = 0; i < rc.length; i++) {
            let swatch = document.createElement('div');
            swatch.className = 'palette-swatch';
            let rgb = _hsbToRgbInternal(rc[i][0], rc[i][1], rc[i][2]);
            swatch.style.backgroundColor = 'rgb(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ')';
            swatch.title = 'HSB(' + rc[i][0] + ', ' + rc[i][1] + ', ' + rc[i][2] + ')';
            paletteEl.appendChild(swatch);
        }
        document.getElementById('infoPanel').className = 'info-panel visible';

        document.getElementById('downloadBtn').disabled = false;
        document.getElementById('generateBtn').disabled = false;
        setStatus('Done. 5100\u00d73300 px (17\u00d711\u2033 at 300 DPI) \u2014 Token #' + tokenNum, 'done');
    }, 20);
}

function downloadPNG() {
    let canvas = document.getElementById('preview');
    let link = document.createElement('a');
    let hashPrefix = lastHash ? lastHash.substring(2, 10) : 'unknown';
    link.download = 'dfam-' + lastTokenNumber + '-' + hashPrefix + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
}
</script>
