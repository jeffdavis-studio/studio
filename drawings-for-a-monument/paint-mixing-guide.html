<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DfaM Paint Mixing Guide</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #d4d4d4;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.6;
    padding: 24px;
    max-width: 900px;
    margin: 0 auto;
  }
  h1 { font-size: 20px; font-weight: 600; color: #e0e0e0; margin-bottom: 4px; }
  .subtitle { color: #777; font-size: 12px; margin-bottom: 24px; }
  textarea {
    width: 100%;
    min-height: 80px;
    background: #111;
    color: #c8e6c9;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 12px;
    font-family: inherit;
    font-size: 13px;
    resize: vertical;
    outline: none;
  }
  textarea:focus { border-color: #555; }
  textarea::placeholder { color: #555; }
  .controls {
    display: flex; gap: 12px; margin-top: 12px; margin-bottom: 24px; align-items: center;
  }
  button {
    background: #2a2a2a; color: #d4d4d4; border: 1px solid #444;
    border-radius: 4px; padding: 8px 16px; font-family: inherit;
    font-size: 13px; cursor: pointer; transition: background 0.15s;
  }
  button:hover { background: #3a3a3a; }
  button.primary { background: #2e5339; border-color: #3d7a50; color: #c8e6c9; }
  button.primary:hover { background: #3d7a50; }
  .toggle-tubes {
    margin-left: auto; font-size: 12px; color: #888; cursor: pointer; user-select: none;
  }
  .toggle-tubes:hover { color: #bbb; }
  .tube-editor {
    display: none; background: #111; border: 1px solid #333;
    border-radius: 6px; padding: 16px; margin-bottom: 24px;
  }
  .tube-editor.open { display: block; }
  .tube-editor h2 { font-size: 14px; color: #999; margin-bottom: 12px; font-weight: 500; }
  .tube-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .tube-swatch {
    width: 20px; height: 20px; border-radius: 3px; border: 1px solid #444; flex-shrink: 0;
  }
  .tube-hsb { color: #666; font-size: 11px; width: 110px; flex-shrink: 0; }
  .tube-row input {
    background: #1a1a1a; color: #d4d4d4; border: 1px solid #333;
    border-radius: 3px; padding: 4px 8px; font-family: inherit;
    font-size: 12px; flex: 1; max-width: 240px; outline: none;
  }
  .tube-row input:focus { border-color: #555; }
  .tube-actions { margin-top: 10px; display: flex; gap: 8px; }
  .results { display: flex; flex-direction: column; gap: 16px; }
  .color-card {
    background: #222; border: 1px solid #333; border-radius: 8px;
    padding: 16px; display: flex; gap: 16px; align-items: flex-start;
  }
  .swatches { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .swatch { width: 72px; height: 72px; border-radius: 6px; border: 1px solid #444; }
  .swatch-label { font-size: 10px; color: #666; text-align: center; margin-top: 2px; }
  .recipe { flex: 1; min-width: 0; }
  .recipe .hsb-input { font-size: 13px; color: #888; margin-bottom: 8px; }
  .recipe-line { margin-bottom: 4px; font-size: 13px; }
  .recipe-line .label { color: #777; }
  .recipe-line .value { color: #e0e0e0; }
  .recipe-line.tube-blend .value { color: #f0c674; }
  .recipe-line.white-mix .value { color: #e8e0d0; }
  .recipe-line.black-mix .value { color: #969896; }
  .recipe-line.none .value { color: #555; font-style: italic; }
  .color-index { font-size: 11px; color: #555; margin-bottom: 4px; }
  .error-msg {
    color: #cc6666; background: #2a1a1a; border: 1px solid #442222;
    border-radius: 4px; padding: 10px; font-size: 13px;
  }
  .mix-bar {
    display: flex; height: 16px; border-radius: 3px;
    overflow: hidden; margin-top: 10px; border: 1px solid #444;
  }
  .mix-bar-seg { height: 100%; position: relative; }
  .mix-bar-seg .tip {
    display: none; position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%); background: #333; color: #ddd;
    padding: 2px 6px; border-radius: 3px; font-size: 10px;
    white-space: nowrap; z-index: 10; pointer-events: none;
  }
  .mix-bar-seg:hover .tip { display: block; }
</style>
</head>
<body>

<h1>DfaM Paint Mixing Guide</h1>
<p class="subtitle">Paste the rc array from console → get gouache mixing recipes</p>

<textarea id="input" placeholder='Paste HSB array, e.g.: [[25, 95, 100], [138, 40, 60], [219, 80, 45]]'></textarea>

<div class="controls">
  <button class="primary" onclick="processInput()">Mix Colors</button>
  <button onclick="loadExample()">Load Example</button>
  <span class="toggle-tubes" onclick="toggleTubeEditor()">⚙ Edit Tube Names</span>
</div>

<div class="tube-editor" id="tubeEditor"></div>
<div class="results" id="results"></div>

<script>
// ============================================================
// TUBE CONFIGURATION
// ============================================================

const DEFAULT_TUBES = [
  { hsb: [5, 89, 84],    name: "Carmine (G502)" },
  { hsb: [9, 82, 93],    name: "Flame Red (G507)" },
  { hsb: [25, 95, 100],  name: "Cadmium Yellow Orange (G525)" },
  { hsb: [33, 100, 100], name: "Permanent Yellow Orange (G522)" },
  { hsb: [56, 100, 100], name: "Lemon Yellow (G526)" },
  { hsb: [70, 80, 86],   name: "Leaf Green (G540)" },
  { hsb: [138, 78, 77],  name: "Permanent Green Light (G541)" },
  { hsb: [175, 99, 71],  name: "Turquoise Green (G554)" },
  { hsb: [187, 100, 77], name: "Cobalt Turquoise (G569)" },
  { hsb: [195, 70, 90],  name: "Aqua Blue (G570)" },
  { hsb: [219, 97, 78],  name: "Ultramarine Light (G564)" },
  { hsb: [325, 85, 72],  name: "Brilliant Red Violet (W&N 050)" },
  { hsb: [354, 92, 74],  name: "Cadmium Red (G504)" },
];

const K_HSB = [240, 3, 13];   // Primary Black (G658)
const W_HSB = [40, 1, 99];    // Primary White (G659)

// ============================================================
// COLOR CONVERSIONS
// ============================================================

function hsbToRgb(h, s, bri) {
  h = ((h % 360) + 360) % 360;
  var sn = s / 100;
  var bn = bri / 100;
  var c = bn * sn;
  var x = c * (1 - Math.abs(((h / 60) % 2) - 1));
  var m = bn - c;
  var r1, g1, b1;
  if      (h < 60)  { r1 = c; g1 = x; b1 = 0; }
  else if (h < 120) { r1 = x; g1 = c; b1 = 0; }
  else if (h < 180) { r1 = 0; g1 = c; b1 = x; }
  else if (h < 240) { r1 = 0; g1 = x; b1 = c; }
  else if (h < 300) { r1 = x; g1 = 0; b1 = c; }
  else              { r1 = c; g1 = 0; b1 = x; }
  return [
    Math.round((r1 + m) * 255),
    Math.round((g1 + m) * 255),
    Math.round((b1 + m) * 255)
  ];
}

function rgbToHsb(r, g, bl) {
  r /= 255; g /= 255; bl /= 255;
  var mx = Math.max(r, g, bl);
  var mn = Math.min(r, g, bl);
  var d = mx - mn;
  var h = 0;
  if (d !== 0) {
    if (mx === r)       h = 60 * (((g - bl) / d + 6) % 6);
    else if (mx === g)  h = 60 * ((bl - r) / d + 2);
    else                h = 60 * ((r - g) / d + 4);
  }
  var s = mx === 0 ? 0 : (d / mx) * 100;
  var bri = mx * 100;
  return [h, s, bri];
}

function rgbToLab(rgb) {
  var r = rgb[0] / 255, g = rgb[1] / 255, bl = rgb[2] / 255;
  r = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
  g = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
  bl = bl > 0.04045 ? Math.pow((bl + 0.055) / 1.055, 2.4) : bl / 12.92;
  var x = (r * 0.4124564 + g * 0.3575761 + bl * 0.1804375) / 0.95047;
  var y = (r * 0.2126729 + g * 0.7151522 + bl * 0.0721750) / 1.00000;
  var z = (r * 0.0193339 + g * 0.1191920 + bl * 0.9503041) / 1.08883;
  x = x > 0.008856 ? Math.pow(x, 1.0/3) : (7.787 * x) + 16.0/116;
  y = y > 0.008856 ? Math.pow(y, 1.0/3) : (7.787 * y) + 16.0/116;
  z = z > 0.008856 ? Math.pow(z, 1.0/3) : (7.787 * z) + 16.0/116;
  return [(116 * y) - 16, 500 * (x - y), 200 * (y - z)];
}

function labToRgb(lab) {
  var y = (lab[0] + 16) / 116;
  var x = lab[1] / 500 + y;
  var z = y - lab[2] / 200;
  x = x*x*x > 0.008856 ? x*x*x : (x - 16.0/116) / 7.787;
  y = y*y*y > 0.008856 ? y*y*y : (y - 16.0/116) / 7.787;
  z = z*z*z > 0.008856 ? z*z*z : (z - 16.0/116) / 7.787;
  x *= 0.95047; y *= 1.00000; z *= 1.08883;
  var r = x *  3.2404542 + y * -1.5371385 + z * -0.4985314;
  var g = x * -0.9692660 + y *  1.8760108 + z *  0.0415560;
  var bl = x *  0.0556434 + y * -0.2040259 + z *  1.0572252;
  r = r > 0.0031308 ? 1.055 * Math.pow(r, 1.0/2.4) - 0.055 : 12.92 * r;
  g = g > 0.0031308 ? 1.055 * Math.pow(g, 1.0/2.4) - 0.055 : 12.92 * g;
  bl = bl > 0.0031308 ? 1.055 * Math.pow(bl, 1.0/2.4) - 0.055 : 12.92 * bl;
  return [
    Math.round(Math.max(0, Math.min(1, r)) * 255),
    Math.round(Math.max(0, Math.min(1, g)) * 255),
    Math.round(Math.max(0, Math.min(1, bl)) * 255)
  ];
}

function betterLerp(col1, col2, t) {
  var arr1 = rgbToLab(col1);
  var arr2 = rgbToLab(col2);
  return labToRgb([
    arr1[0] + t * (arr2[0] - arr1[0]),
    arr1[1] + t * (arr2[1] - arr1[1]),
    arr1[2] + t * (arr2[2] - arr1[2])
  ]);
}

// ============================================================
// TUBE NAME PERSISTENCE
// ============================================================

function loadTubeNames() {
  try {
    var saved = localStorage.getItem('dfam-tube-names');
    if (saved) {
      var names = JSON.parse(saved);
      if (Array.isArray(names) && names.length === 13) return names;
    }
  } catch(e) {}
  return DEFAULT_TUBES.map(function(t) { return t.name; });
}

function saveTubeNames(names) {
  localStorage.setItem('dfam-tube-names', JSON.stringify(names));
}

var tubeNames = loadTubeNames();

// ============================================================
// TUBE EDITOR
// ============================================================

function renderTubeEditor() {
  var el = document.getElementById('tubeEditor');
  var html = '<h2>Paint Tube Names — saved to localStorage</h2>';
  for (var i = 0; i < DEFAULT_TUBES.length; i++) {
    var tube = DEFAULT_TUBES[i];
    var rgb = hsbToRgb(tube.hsb[0], tube.hsb[1], tube.hsb[2]);
    html += '<div class="tube-row">'
      + '<div class="tube-swatch" style="background:rgb(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ')"></div>'
      + '<span class="tube-hsb">H' + tube.hsb[0] + ' S' + tube.hsb[1] + ' B' + tube.hsb[2] + '</span>'
      + '<input type="text" id="tn' + i + '" value="' + tubeNames[i] + '" />'
      + '</div>';
  }
  html += '<div class="tube-actions">'
    + '<button onclick="saveTubeEditor()">Save Names</button>'
    + '<button onclick="resetTubeNames()">Reset Defaults</button>'
    + '</div>';
  el.innerHTML = html;
}

function toggleTubeEditor() {
  var el = document.getElementById('tubeEditor');
  el.classList.toggle('open');
  if (el.classList.contains('open')) renderTubeEditor();
}

function saveTubeEditor() {
  var names = [];
  for (var i = 0; i < 13; i++) {
    var v = document.getElementById('tn' + i).value.trim();
    names.push(v || DEFAULT_TUBES[i].name);
  }
  tubeNames = names;
  saveTubeNames(names);
  var input = document.getElementById('input').value.trim();
  if (input) processInput();
}

function resetTubeNames() {
  tubeNames = DEFAULT_TUBES.map(function(t) { return t.name; });
  saveTubeNames(tubeNames);
  renderTubeEditor();
}

// ============================================================
// CORE: paintColor() — faithful translation from DfaM
// ============================================================

function paintColor(h, s, bri) {
  var p = DEFAULT_TUBES.map(function(t) { return t.hsb; });
  var pRgb = p.map(function(c) { return hsbToRgb(c[0], c[1], c[2]); });

  // Step 1: Find bracketing tubes
  var idx1 = -1, idx2 = -1, t = 0;
  var exactMatch = -1;

  // Check exact match first
  for (var i = 0; i < p.length; i++) {
    if (h === p[i][0]) { exactMatch = i; break; }
  }

  if (exactMatch >= 0) {
    idx1 = exactMatch;
    idx2 = exactMatch;
    t = 0;
  } else if (h >= p[12][0] || h < p[0][0]) {
    // Wrap-around: between tube 13 (hue 354) and tube 1 (hue 5)
    idx1 = 12;
    idx2 = 0;
    var hueFrom = p[12][0]; // 354
    var hueTo = p[0][0];    // 5
    var span = (hueTo - hueFrom + 360) % 360; // 11
    var dist = (h - hueFrom + 360) % 360;
    t = span === 0 ? 0 : dist / span;
  } else {
    for (var i = 0; i < p.length - 1; i++) {
      if (h >= p[i][0] && h < p[i + 1][0]) {
        idx1 = i;
        idx2 = i + 1;
        var span = p[i + 1][0] - p[i][0];
        t = span === 0 ? 0 : (h - p[i][0]) / span;
        break;
      }
    }
  }

  // Interpolate in Lab space
  var interpRgb;
  if (exactMatch >= 0) {
    interpRgb = pRgb[exactMatch];
  } else {
    interpRgb = betterLerp(pRgb[idx1], pRgb[idx2], t);
  }

  // Get HSB of interpolated color for maxw/maxk
  var interpHsb = rgbToHsb(interpRgb[0], interpRgb[1], interpRgb[2]);
  var maxw = interpHsb[1]; // max saturation from this color
  var maxk = interpHsb[2]; // max brightness from this color

  // Step 2: Saturation/brightness mixing
  var f = (s / 100) * (bri / 100);

  var s1 = W_HSB[1] + (s / 100) * (100 - W_HSB[1]);
  var b1 = K_HSB[2] + (bri / 100) * (W_HSB[2] - K_HSB[2]);
  var s2 = W_HSB[1] + (s / 100) * (maxw - W_HSB[1]);
  var b2 = K_HSB[2] + (bri / 100) * (maxk - K_HSB[2]);

  var newS = s1 + f * (s2 - s1);
  var newB = b1 + f * (b2 - b1);
  var newH = interpHsb[0];

  var outputRgb = hsbToRgb(newH, newS, newB);

  // Step 3: Recipe percentages
  var tubeRecipe;
  if (exactMatch >= 0) {
    tubeRecipe = [{ idx: exactMatch, pct: 100 }];
  } else {
    var pct2 = Math.round(t * 100);
    var pct1 = 100 - pct2;
    if (pct1 >= 100) {
      tubeRecipe = [{ idx: idx1, pct: 100 }];
    } else if (pct2 >= 100) {
      tubeRecipe = [{ idx: idx2, pct: 100 }];
    } else {
      tubeRecipe = [];
      if (pct1 > 0) tubeRecipe.push({ idx: idx1, pct: pct1 });
      if (pct2 > 0) tubeRecipe.push({ idx: idx2, pct: pct2 });
    }
  }

  // White = how much saturation is reduced from full (100)
  var whitePct = Math.round((1 - s / 100) * 100);
  // Black = how much brightness is reduced from full (100)
  var blackPct = Math.round((1 - bri / 100) * 100);

  return {
    inputHsb: [h, s, bri],
    inputRgb: hsbToRgb(h, s, bri),
    outputHsb: [Math.round(newH * 10) / 10, Math.round(newS * 10) / 10, Math.round(newB * 10) / 10],
    outputRgb: outputRgb,
    tubeRecipe: tubeRecipe,
    whitePct: whitePct,
    blackPct: blackPct
  };
}

// ============================================================
// INPUT PARSING
// ============================================================

function parseInput(text) {
  text = text.trim();
  text = text.replace(/^(let|var|const)?\s*\w+\s*=\s*/, '');
  text = text.replace(/;\s*$/, '');
  try {
    var parsed = JSON.parse(text);
    if (Array.isArray(parsed)) {
      if (parsed.length === 3 && typeof parsed[0] === 'number') return [parsed];
      return parsed.filter(function(c) { return Array.isArray(c) && c.length === 3; });
    }
  } catch(e) {
    try {
      var result = (new Function('return ' + text))();
      if (Array.isArray(result)) {
        if (result.length === 3 && typeof result[0] === 'number') return [result];
        return result.filter(function(c) { return Array.isArray(c) && c.length === 3; });
      }
    } catch(e2) {}
  }
  return null;
}

// ============================================================
// RENDERING
// ============================================================

function rc(rgb) { return 'rgb(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ')'; }

function esc(s) {
  var d = document.createElement('span');
  d.textContent = s;
  return d.innerHTML;
}

function renderResults(colors) {
  var el = document.getElementById('results');
  if (!colors || colors.length === 0) {
    el.innerHTML = '<div class="error-msg">No valid HSB colors found. Expected format: [[h,s,b], [h,s,b], ...]</div>';
    return;
  }

  var html = '';
  for (var ci = 0; ci < colors.length; ci++) {
    var c = colors[ci];
    var h = c[0], s = c[1], bri = c[2];

    // Validate ranges
    if (h < 0 || h > 360 || s < 0 || s > 100 || bri < 0 || bri > 100) {
      html += '<div class="error-msg">Color ' + (ci + 1) + ': Invalid HSB values [' + h + ', ' + s + ', ' + bri + ']. '
        + 'H: 0-360, S: 0-100, B: 0-100</div>';
      continue;
    }

    var result = paintColor(h, s, bri);

    // Build tube blend string
    var tubeStr = result.tubeRecipe.map(function(tr) {
      return tr.pct + '% ' + esc(tubeNames[tr.idx]);
    }).join(' + ');

    // White/black strings
    var whiteStr = result.whitePct > 0
      ? '<span class="value">' + result.whitePct + '% White</span>'
      : '<span class="value none">No white</span>';
    var blackStr = result.blackPct > 0
      ? '<span class="value">' + result.blackPct + '% Black</span>'
      : '<span class="value none">No black</span>';

    // Mixing bar
    var colorAmt = (s / 100) * (bri / 100) * 100;
    var whiteAmt = result.whitePct;
    var blackAmt = result.blackPct;
    var barTotal = colorAmt + whiteAmt + blackAmt;
    if (barTotal === 0) barTotal = 1;

    var barHtml = '<div class="mix-bar">';
    for (var ti = 0; ti < result.tubeRecipe.length; ti++) {
      var tr = result.tubeRecipe[ti];
      var segW = (tr.pct / 100) * colorAmt / barTotal * 100;
      if (segW > 0.3) {
        var tRgb = hsbToRgb(DEFAULT_TUBES[tr.idx].hsb[0], DEFAULT_TUBES[tr.idx].hsb[1], DEFAULT_TUBES[tr.idx].hsb[2]);
        barHtml += '<div class="mix-bar-seg" style="width:' + segW + '%;background:' + rc(tRgb) + '">'
          + '<span class="tip">' + esc(tubeNames[tr.idx]) + '</span></div>';
      }
    }
    var wW = whiteAmt / barTotal * 100;
    if (wW > 0.3) {
      barHtml += '<div class="mix-bar-seg" style="width:' + wW + '%;background:#f0ebe0">'
        + '<span class="tip">White</span></div>';
    }
    var bW = blackAmt / barTotal * 100;
    if (bW > 0.3) {
      barHtml += '<div class="mix-bar-seg" style="width:' + bW + '%;background:#222">'
        + '<span class="tip">Black</span></div>';
    }
    barHtml += '</div>';

    html += '<div class="color-card">'
      + '<div class="swatches">'
      + '  <div>'
      + '    <div class="swatch" style="background:' + rc(result.inputRgb) + '"></div>'
      + '    <div class="swatch-label">Input</div>'
      + '  </div>'
      + '  <div>'
      + '    <div class="swatch" style="background:' + rc(result.outputRgb) + '"></div>'
      + '    <div class="swatch-label">Paint</div>'
      + '  </div>'
      + '</div>'
      + '<div class="recipe">'
      + '  <div class="color-index">Color ' + (ci + 1) + ' of ' + colors.length + '</div>'
      + '  <div class="hsb-input">HSB [' + h + ', ' + s + ', ' + bri + ']'
      + '    → Paint HSB [' + result.outputHsb[0] + ', ' + result.outputHsb[1] + ', ' + result.outputHsb[2] + ']</div>'
      + '  <div class="recipe-line tube-blend"><span class="label">Tubes: </span><span class="value">' + tubeStr + '</span></div>'
      + '  <div class="recipe-line white-mix"><span class="label">White: </span>' + whiteStr + '</div>'
      + '  <div class="recipe-line black-mix"><span class="label">Black: </span>' + blackStr + '</div>'
      + barHtml
      + '</div>'
      + '</div>';
  }

  el.innerHTML = html;
}

function processInput() {
  var text = document.getElementById('input').value;
  var colors = parseInput(text);
  renderResults(colors);
}

function loadExample() {
  document.getElementById('input').value = '[[25, 95, 100], [138, 40, 60], [219, 80, 45], [354, 92, 74], [56, 100, 100], [175, 50, 35], [0, 20, 90], [300, 60, 50]]';
  processInput();
}

// Process on Enter (Cmd/Ctrl+Enter)
document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    processInput();
  }
});
</script>
</body>
</html>
