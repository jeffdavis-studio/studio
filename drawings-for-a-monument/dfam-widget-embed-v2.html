<style>
  /* Hide native Squarespace product block (must remain in DOM for cart/form functionality) */
  .sqs-block-product, .product-block { display: none !important; }

  /* Pre-hide the form lightbox so it never flashes when we programmatically trigger it */
  .sqs-block-form-lightbox, .sqs-modal-lightbox {
    opacity: 0 !important;
    pointer-events: none !important;
  }

  /* ---- Minimal structural CSS (only what Squarespace can't provide) ---- */

  .dfam-widget {
    max-width: 600px;
    margin: 0 auto;
    padding: 2rem 0;
  }

  .dfam-token-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin: 1.5rem 0;
  }

  .dfam-token-card {
    position: relative;
    border: 2px solid transparent;
    border-radius: 4px;
    padding: 0.5rem;
    cursor: pointer;
    transition: border-color 0.2s;
    text-align: center;
  }

  .dfam-token-card:hover {
    border-color: currentColor;
  }

  .dfam-token-card.selected {
    border-color: currentColor;
    outline: 1px solid currentColor;
  }

  .dfam-token-card.claimed {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }

  .dfam-token-card .token-claimed-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background: currentColor;
    color: #fff;
    padding: 2px 6px;
    border-radius: 3px;
  }

  .dfam-token-card img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 2px;
  }

  .dfam-token-card .token-id {
    font-size: 0.8em;
    margin-top: 0.4rem;
    opacity: 0.6;
  }

  .dfam-purchase-section {
    margin-top: 1.5rem;
  }

  .dfam-spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: dfam-spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
    opacity: 0.5;
  }

  @keyframes dfam-spin {
    to { transform: rotate(360deg); }
  }

  .dfam-status {
    margin: 1rem 0;
    padding: 1rem;
    font-size: 0.9em;
  }

  .dfam-wallet-info {
    font-size: 0.85em;
    opacity: 0.6;
    margin-bottom: 1rem;
  }

  .dfam-disconnect {
    background: none;
    border: none;
    color: inherit;
    font-size: inherit;
    font-family: inherit;
    cursor: pointer;
    text-decoration: underline;
    opacity: 0.7;
    padding: 0;
    margin-left: 0.5rem;
  }

  .dfam-disconnect:hover {
    opacity: 1;
  }

  @media (max-width: 480px) {
    .dfam-token-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>

<div class="dfam-widget" id="dfam-widget">
  <div id="dfam-content">
    <div id="dfam-connect">
      <button class="sqs-block-button-element--medium sqs-button-element--primary sqs-block-button-element" id="dfam-connect-btn" onclick="dfamConnect()">Connect Wallet</button>
    </div>

    <div id="dfam-loading" style="display:none;">
      <div class="dfam-status">
        <span class="dfam-spinner"></span> Checking your wallet for DfaM tokens…
      </div>
    </div>

    <div id="dfam-empty" style="display:none;">
      <div class="dfam-status">
        This wallet doesn't hold any Drawings for a Monument tokens.<br><br>
        <a href="https://www.artblocks.io/collections/presents/projects/0xababababab20053426ad1c782de9ea8444358070-3" target="_blank">View DfaM on Art Blocks →</a>
      </div>
    </div>

    <div id="dfam-error" style="display:none;">
      <div class="dfam-status" id="dfam-error-msg"></div>
    </div>

    <div id="dfam-adding" style="display:none;">
      <div class="dfam-status">
        <span class="dfam-spinner"></span> Adding to cart…
      </div>
    </div>

    <div id="dfam-added" style="display:none;">
      <div class="dfam-status" id="dfam-added-msg">
        Added to cart!
      </div>
    </div>

    <div id="dfam-tokens" style="display:none;">
      <div class="dfam-wallet-info">
        Connected: <code id="dfam-wallet-addr"></code>
        <button class="dfam-disconnect" onclick="dfamDisconnect()">disconnect</button>
      </div>
      <p>Select the token you'd like painted:</p>
      <div class="dfam-token-grid" id="dfam-token-grid"></div>

      <div class="dfam-purchase-section">
        <button class="sqs-block-button-element--medium sqs-button-element--primary sqs-block-button-element" id="dfam-purchase-btn" disabled onclick="dfamPurchase()">Select a token above</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var DFAM_CONTRACT = '0xababababab20053426ad1c782de9ea8444358070';
  var DFAM_PROJECT_ID = DFAM_CONTRACT + '-3';
  var ART_BLOCKS_GRAPHQL = 'https://artblocks-mainnet.hasura.app/v1/graphql';
  var THUMBNAIL_URL = 'https://media.artblocks.io/' + DFAM_CONTRACT + '/{id}.png';
  var SQUARESPACE_PRODUCT_URL = 'https://www.jeffgdavis.com/dfam';
  var SQS_FORM_FIELD_LABEL = 'Token ID';

  var selectedTokenId = null;
  var connectedAddress = null;

  function show(id) { document.getElementById(id).style.display = ''; }
  function hide(id) { document.getElementById(id).style.display = 'none'; }
  function hideAll() {
    ['dfam-connect','dfam-loading','dfam-empty',
     'dfam-error','dfam-tokens','dfam-adding','dfam-added'].forEach(hide);
  }

  function init() {
    checkUrlToken();
    hideAll();
    show('dfam-connect');
  }

  function checkUrlToken() {
    var params = new URLSearchParams(window.location.search);
    var urlToken = params.get('token');
    if (!urlToken) return;
    setTimeout(function() { autoFillAndSubmit(urlToken); }, 1500);
  }

  function autoFillAndSubmit(tokenId) {
    var productBlock = document.querySelector('.sqs-block-product, .product-block');
    if (productBlock) {
      productBlock.style.setProperty('display', 'block', 'important');
      productBlock.style.setProperty('position', 'absolute', 'important');
      productBlock.style.setProperty('left', '-9999px', 'important');
      productBlock.style.setProperty('height', '0', 'important');
      productBlock.style.setProperty('overflow', 'hidden', 'important');
    }
    var addBtn = document.querySelector('.sqs-add-to-cart-button');
    if (!addBtn) return;
    addBtn.click();
    setTimeout(function() {
      var filled = fillFormField(tokenId);
      if (filled) {
        submitProductForm(tokenId);
      } else {
        var url = new URL(window.location);
        url.searchParams.delete('token');
        window.history.replaceState({}, '', url.toString());
        if (productBlock) productBlock.style.cssText = 'display: none !important;';
      }
    }, 800);
  }

  window.dfamConnect = async function() {
    var btn = document.getElementById('dfam-connect-btn');
    btn.disabled = true;
    btn.textContent = 'Connecting\u2026';
    try {
      if (typeof window.ethereum === 'undefined') {
        throw new Error('No Ethereum wallet detected. Install MetaMask or another Web3 wallet and refresh.');
      }
      var accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      if (!accounts || accounts.length === 0) throw new Error('No accounts returned');
      connectedAddress = accounts[0];
      await loadTokens(connectedAddress);
    } catch (err) {
      hideAll();
      if (err.code === 4001) {
        show('dfam-connect');
        btn.disabled = false;
        btn.textContent = 'Connect Wallet';
      } else {
        document.getElementById('dfam-error-msg').textContent = (err.message || 'Unknown error');
        show('dfam-error');
      }
    }
  };

  window.dfamDisconnect = function() {
    connectedAddress = null;
    selectedTokenId = null;
    hideAll();
    show('dfam-connect');
    var btn = document.getElementById('dfam-connect-btn');
    btn.disabled = false;
    btn.textContent = 'Connect Wallet';
  };

  async function loadTokens(address) {
    hideAll();
    show('dfam-loading');
    try {
      var owner = address.toLowerCase();
      var res = await fetch(ART_BLOCKS_GRAPHQL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query: 'query DfaMTokens($owner: String!, $contract: String!, $projectId: String!) { tokens_metadata(where: { owner_address: { _eq: $owner }, contract_address: { _eq: $contract }, project_id: { _eq: $projectId } }, limit: 200) { token_id media_thumb_url features } }',
          variables: { owner: owner, contract: DFAM_CONTRACT, projectId: DFAM_PROJECT_ID }
        })
      });
      var json = await res.json();
      if (json.errors && json.errors.length) throw new Error(json.errors[0].message || 'GraphQL error');

      var list = (json.data && json.data.tokens_metadata) || [];
      var dfamTokens = list
        .map(function(t) {
          var features = t.features || {};
          return {
            tokenId: t.token_id,
            thumb: t.media_thumb_url || null,
            claimed: (features.Drawing === 'Claimed')
          };
        })
        .sort(function(a, b) { return Number(a.tokenId) - Number(b.tokenId); });

      hideAll();
      if (dfamTokens.length === 0) { show('dfam-empty'); return; }
      renderTokens(dfamTokens, address);
      show('dfam-tokens');
    } catch (err) {
      hideAll();
      document.getElementById('dfam-error-msg').textContent =
        'Error loading tokens: ' + (err.message || 'Unknown error') + '. Please try again.';
      show('dfam-error');
    }
  }

  function renderTokens(tokens, address) {
    var grid = document.getElementById('dfam-token-grid');
    var addrEl = document.getElementById('dfam-wallet-addr');
    addrEl.textContent = address.slice(0, 6) + '\u2026' + address.slice(-4);
    grid.innerHTML = '';
    selectedTokenId = null;

    tokens.forEach(function(t) {
      var tokenId = t.tokenId;
      var card = document.createElement('div');
      card.className = 'dfam-token-card' + (t.claimed ? ' claimed' : '');
      card.setAttribute('data-token', tokenId);

      var img = document.createElement('img');
      img.src = t.thumb || THUMBNAIL_URL.replace('{id}', tokenId);
      img.alt = 'DfaM #' + tokenId;
      img.loading = 'lazy';
      img.onerror = function() { this.alt = '#' + tokenId; };

      var label = document.createElement('div');
      label.className = 'token-id';
      label.textContent = '#' + tokenId;

      card.appendChild(img);
      card.appendChild(label);

      if (t.claimed) {
        var badge = document.createElement('div');
        badge.className = 'token-claimed-badge';
        badge.textContent = 'Claimed';
        card.appendChild(badge);
      } else {
        card.addEventListener('click', function() {
          var prev = grid.querySelector('.selected');
          if (prev) prev.classList.remove('selected');
          card.classList.add('selected');
          selectedTokenId = tokenId;
          var btn = document.getElementById('dfam-purchase-btn');
          btn.disabled = false;
          btn.textContent = 'Purchase Commission \u2014 $500';
        });
      }
      grid.appendChild(card);
    });

    var purchaseBtn = document.getElementById('dfam-purchase-btn');
    purchaseBtn.disabled = true;
    purchaseBtn.textContent = 'Select a token above';
  }

  window.dfamPurchase = function() {
    if (!selectedTokenId) return;
    var purchaseBtn = document.getElementById('dfam-purchase-btn');
    purchaseBtn.disabled = true;
    purchaseBtn.textContent = 'Adding to cart\u2026';

    var addBtn = document.querySelector('.sqs-add-to-cart-button');
    if (addBtn) {
      directAddToCart(selectedTokenId, addBtn);
      return;
    }
    redirectToProduct(selectedTokenId);
  };

  function directAddToCart(tokenId, addBtn) {
    hideAll();
    show('dfam-adding');

    var productBlock = document.querySelector('.sqs-block-product, .product-block');
    if (productBlock) {
      productBlock.style.setProperty('display', 'block', 'important');
      productBlock.style.setProperty('position', 'absolute', 'important');
      productBlock.style.setProperty('left', '-9999px', 'important');
      productBlock.style.setProperty('height', '0', 'important');
      productBlock.style.setProperty('overflow', 'hidden', 'important');
    }

    addBtn.click();

    setTimeout(function() {
      var filled = fillFormField(tokenId);
      if (filled) {
        submitProductForm(tokenId);
      } else {
        setTimeout(function() {
          var filledRetry = fillFormField(tokenId);
          if (filledRetry) {
            submitProductForm(tokenId);
          } else {
            if (productBlock) productBlock.style.cssText = 'display: none !important;';
            redirectToProduct(tokenId);
          }
        }, 1000);
      }
    }, 800);
  }

  function fillFormField(tokenId) {
    var allLabels = document.querySelectorAll('label, .form-item .title, .field-label, .caption-text, .SP08ZLkhAnk2Rqaf');
    var targetInput = null;

    for (var i = 0; i < allLabels.length; i++) {
      var labelText = (allLabels[i].textContent || '').trim().replace(/\s*\(required\)\s*/i, '').trim();
      if (labelText.toLowerCase() === SQS_FORM_FIELD_LABEL.toLowerCase()) {
        var parent = allLabels[i].closest('.form-item') ||
                     allLabels[i].closest('.field') ||
                     allLabels[i].parentElement;
        if (parent) targetInput = parent.querySelector('input[type="text"], input:not([type]), textarea');
        if (!targetInput) {
          var forId = allLabels[i].getAttribute('for');
          if (forId) targetInput = document.getElementById(forId);
        }
        if (targetInput) break;
      }
    }

    if (!targetInput) return false;

    var nativeSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value');
    if (nativeSetter && nativeSetter.set) {
      nativeSetter.set.call(targetInput, String(tokenId));
    } else {
      targetInput.value = String(tokenId);
    }

    targetInput.dispatchEvent(new Event('input', { bubbles: true }));
    targetInput.dispatchEvent(new Event('change', { bubbles: true }));
    targetInput.dispatchEvent(new Event('blur', { bubbles: true }));
    return true;
  }

  function submitProductForm(tokenId) {
    setTimeout(function() {
      var submitBtn = document.querySelector(
        '.sqs-block-form-lightbox .form-submit-button, ' +
        '.sqs-block-form-lightbox button[type="submit"], ' +
        '.sqs-modal-lightbox .sqs-add-to-cart-button, ' +
        '.sqs-product-form-modal .sqs-add-to-cart-button'
      );

      if (submitBtn) {
        submitBtn.click();
      } else {
        var mainBtn = document.querySelector('.sqs-add-to-cart-button');
        if (mainBtn) mainBtn.click();
      }

      hideAll();
      show('dfam-added');
      document.getElementById('dfam-added-msg').innerHTML =
        '\u2713 <strong>DfaM #' + tokenId + '</strong> commission added to cart!<br><br>' +
        '<a href="/commerce/show-cart">View Cart &amp; Checkout \u2192</a>';

      var productBlock = document.querySelector('.sqs-block-product, .product-block');
      if (productBlock) productBlock.style.cssText = 'display: none !important;';

      setTimeout(function() {
        var closeBtn = document.querySelector('.sqs-block-form-lightbox .lightbox-close, .sqs-modal-lightbox .lightbox-close');
        if (closeBtn) closeBtn.click();
        var overlay = document.querySelector('.sqs-block-form-lightbox, .sqs-modal-lightbox');
        if (overlay) overlay.style.display = 'none';
      }, 500);
    }, 300);
  }

  function redirectToProduct(tokenId) {
    var url = SQUARESPACE_PRODUCT_URL;
    url += (url.indexOf('?') === -1 ? '?' : '&') + 'token=' + tokenId;
    window.location.href = url;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
