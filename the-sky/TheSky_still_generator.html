<!DOCTYPE html>

<style>

<body>

<h1>The Sky v2 — Still Generator</h1>
<p class="subtitle">Export PNG stills of all 10 sky conditions at any resolution</p>

<!-- CONTROLS -->

</div>

<!-- GRID -->
<div class="section-header">

<!-- STATUS -->
<div class="status-bar">
  <div id="status" class="status-text">Ready. Click a preview to download, or use Export All.</div>

<script>
// ============================================================================
// SKY CONDITIONS — copied directly from TheSky_v2.js
// ============================================================================

const SKY_CONDITIONS = {

  },

      { position: 0.35, height: 0.25, opacity: 0.30, falloff: 0.10, bottomPickup: 0.05 },

    ],
  },
  overcastDawn: {

    topColor: { h: [211, 219], s: [16, 20], b: [56, 60] },
    botColor: { h: [26, 34],  s: [10, 14], b: [74, 78] },
    clouds: [
      { position: 0.40, height: 0.45, opacity: 0.18, falloff: 0.12, bottomPickup: 0.15 },
      { position: 0.75, height: 0.40, opacity: 0.14, falloff: 0.10, bottomPickup: 0.20 },
    ],
  },
  overcastMidday: {
    label: 'Overcast Midday',
    topColor: { h: [207, 213], s: [10, 14], b: [76, 80] },
    botColor: { h: [202, 208], s: [6, 10],  b: [86, 90] },
    clouds: [
      { position: 0.30, height: 0.50, opacity: 0.12, falloff: 0.14, bottomPickup: 0.05 },
      { position: 0.70, height: 0.45, opacity: 0.10, falloff: 0.12, bottomPickup: 0.08 },
    ],
  },
  overcastSunset: {
    label: 'Overcast Sunset',
    topColor: { h: [24, 32],  s: [15, 21], b: [39, 45] },
    botColor: { h: [20, 28],  s: [11, 17], b: [57, 63] },
    clouds: [
      { position: 0.50, height: 0.55, opacity: 0.16, falloff: 0.13, bottomPickup: 0.20 },
    ],
  },
  overcastDusk: {
    label: 'Overcast Dusk',
    topColor: { h: [215, 221], s: [16, 20], b: [22, 26] },
    botColor: { h: [213, 219], s: [6, 10],  b: [46, 50] },
    clouds: [],  // no clouds — bare gradient is correct for this state
  },
  overcastNight: {
    label: 'Overcast Night',
    topColor: { h: [22, 28],  s: [22, 28], b: [6, 10] },
    botColor: { h: [32, 38],  s: [75, 81], b: [70, 74] },
    clouds: [
      { position: 0.85, height: 0.30, opacity: 0.40, falloff: 0.11, bottomPickup: 0.60 },
    ],
  },
};

const TIME_SLOTS = [
  ['dawn', 'overcastDawn'],
  ['midday', 'overcastMidday'],
  ['sunset', 'overcastSunset'],
  ['dusk', 'overcastDusk'],
  ['night', 'overcastNight'],
];

// ============================================================================
// COLOR UTILITIES — ported from TheSky_v2.js
// ============================================================================

function wrapHSB(c) {
  let h = c[0] % 360; if (h < 0) h += 360;
  return [h, Math.max(0, Math.min(100, c[1])), Math.max(0, Math.min(100, c[2]))];
}

function hsbToRgb(hsb) {
  let h = hsb[0], s = hsb[1] / 100, v = hsb[2] / 100;
  let c = v * s;
  let x = c * (1 - Math.abs(((h / 60) % 2) - 1));
  let m = v - c;
  let r, g, b;
  if      (h < 60)  { r = c; g = x; b = 0; }
  else if (h < 120) { r = x; g = c; b = 0; }
  else if (h < 180) { r = 0; g = c; b = x; }
  else if (h < 240) { r = 0; g = x; b = c; }
  else if (h < 300) { r = x; g = 0; b = c; }
  else              { r = c; g = 0; b = x; }
  return [(r + m) * 255, (g + m) * 255, (b + m) * 255];
}

function rgbToLab(c) {
  let r = c[0] / 255, g = c[1] / 255, b = c[2] / 255;
  r = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
  g = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
  b = b > 0.04045 ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
  let x = (r * 0.4124 + g * 0.3576 + b * 0.1805) * 100;
  let y = (r * 0.2126 + g * 0.7152 + b * 0.0722) * 100;
  let z = (r * 0.0193 + g * 0.1192 + b * 0.9505) * 100;
  x /= 95.047; y /= 100; z /= 108.883;
  x = x > 0.008856 ? Math.pow(x, 1/3) : 7.787 * x + 16/116;
  y = y > 0.008856 ? Math.pow(y, 1/3) : 7.787 * y + 16/116;
  z = z > 0.008856 ? Math.pow(z, 1/3) : 7.787 * z + 16/116;
  return [(116 * y) - 16, 500 * (x - y), 200 * (y - z)];
}

function labToRgb(a) {
  let cl = a[0], ca = a[1], cb = a[2];
  let y = (cl + 16) / 116;
  let x = ca / 500 + y;
  let z = y - cb / 200;
  y = Math.pow(y, 3) > 0.008856 ? Math.pow(y, 3) : (y - 16/116) / 7.787;
  x = Math.pow(x, 3) > 0.008856 ? Math.pow(x, 3) : (x - 16/116) / 7.787;
  z = Math.pow(z, 3) > 0.008856 ? Math.pow(z, 3) : (z - 16/116) / 7.787;
  x *= 95.047; y *= 100; z *= 108.883;
  let r = (x * 3.2406 + y * -1.5372 + z * -0.4986) / 100;
  let g = (x * -0.9689 + y * 1.8758 + z * 0.0415) / 100;
  let b = (x * 0.0557 + y * -0.2040 + z * 1.0570) / 100;
  r = r > 0.0031308 ? 1.055 * Math.pow(r, 1/2.4) - 0.055 : 12.92 * r;
  g = g > 0.0031308 ? 1.055 * Math.pow(g, 1/2.4) - 0.055 : 12.92 * g;
  b = b > 0.0031308 ? 1.055 * Math.pow(b, 1/2.4) - 0.055 : 12.92 * b;
  return [
    Math.max(0, Math.min(255, r * 255)),
    Math.max(0, Math.min(255, g * 255)),
    Math.max(0, Math.min(255, b * 255)),
  ];
}

function betterLerp(col1, col2, t) {
  let lab1 = rgbToLab(col1);
  let lab2 = rgbToLab(col2);
  return labToRgb([
    lab1[0] + t * (lab2[0] - lab1[0]),
    lab1[1] + t * (lab2[1] - lab1[1]),
    lab1[2] + t * (lab2[2] - lab1[2]),
  ]);
}

function midpoint(range) { return (range[0] + range[1]) / 2; }

// Build a resolved color state from a condition
function resolveCondition(condKey, useMidpoint) {
  let cond = SKY_CONDITIONS[condKey];

  function pickHSB(def) {
    if (useMidpoint) {
      return [midpoint(def.h), midpoint(def.s), midpoint(def.b)];
    } else {
      return [
        def.h[0] + Math.random() * (def.h[1] - def.h[0]),
        def.s[0] + Math.random() * (def.s[1] - def.s[0]),
        def.b[0] + Math.random() * (def.b[1] - def.b[0]),
      ];
    }
  }

  let topRgb = hsbToRgb(wrapHSB(pickHSB(cond.topColor)));
  let botRgb = hsbToRgb(wrapHSB(pickHSB(cond.botColor)));

  return { topRgb, botRgb, clouds: cond.clouds };
}

// ============================================================================
// RENDERER — draws to any canvas at full native resolution
// ============================================================================

function renderToCanvas(canvas, condKey, opts) {
  let { useMidpoint, includeClouds } = opts;
  let state = resolveCondition(condKey, useMidpoint);
  let ctx = canvas.getContext('2d');
  let w = canvas.width;
  let h = canvas.height;

  // Use ImageData for speed — one pixel write per row
  let imageData = ctx.createImageData(w, h);
  let data = imageData.data;

  let clouds = includeClouds ? state.clouds : [];

  for (let y = 0; y < h; y++) {
    let ny = y / h;

    // Base gradient (Lab interpolated)
    let base = betterLerp(state.topRgb, state.botRgb, ny);

    // Cloud layers
    for (let ci = 0; ci < clouds.length; ci++) {
      let cl = clouds[ci];
      if (cl.height < 0.001) continue;
      let dist = Math.abs(ny - cl.position) / cl.height;
      let gaussian = Math.exp(-dist * dist / (2 * cl.falloff));
      let influence = gaussian * cl.opacity;
      if (influence > 0.001) {
        // Cloud color: blend of white and bottom color pickup
        let white = [255, 255, 255];
        let cloudColor = betterLerp(white, state.botRgb, cl.bottomPickup || 0);
        base = betterLerp(base, cloudColor, influence);
      }
    }

    let r = Math.round(Math.max(0, Math.min(255, base[0])));
    let g = Math.round(Math.max(0, Math.min(255, base[1])));
    let b = Math.round(Math.max(0, Math.min(255, base[2])));

    for (let x = 0; x < w; x++) {
      let idx = (y * w + x) * 4;
      data[idx]     = r;
      data[idx + 1] = g;
      data[idx + 2] = b;
      data[idx + 3] = 255;
    }
  }

  ctx.putImageData(imageData, 0, 0);
}

// ============================================================================
// UI STATE
// ============================================================================

let currentW = 1920;
let currentH = 1080;

function getOpts() {
  return {
    useMidpoint: document.getElementById('use-midpoint').checked,
    includeClouds: document.getElementById('show-clouds').checked,
  };
}

function getResolution() {
  let preset = document.getElementById('res-preset').value;
  if (preset === 'custom') {
    let w = parseInt(document.getElementById('custom-w').value) || 1920;
    let h = parseInt(document.getElementById('custom-h').value) || 1080;
    return { w: Math.max(100, Math.min(16000, w)), h: Math.max(100, Math.min(16000, h)) };
  }
  let [w, h] = preset.split('x').map(Number);
  return { w, h };
}

function setStatus(msg, active) {
  let el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-text' + (active ? ' active' : '');
}

// ============================================================================
// DOWNLOAD
// ============================================================================

function conditionFilename(condKey, w, h) {
  let label = SKY_CONDITIONS[condKey].label.toLowerCase().replace(/\s+/g, '-');
  return `the-sky_${label}_${w}x${h}.png`;
}

function downloadCondition(condKey) {
  let { w, h } = getResolution();
  let opts = getOpts();
  let offscreen = document.getElementById('offscreen-canvas');
  offscreen.width = w;
  offscreen.height = h;

  setStatus(`Rendering ${SKY_CONDITIONS[condKey].label} at ${w}×${h}…`, true);

  // Yield to browser to update status, then render
  setTimeout(() => {
    renderToCanvas(offscreen, condKey, opts);
    let link = document.createElement('a');
    link.download = conditionFilename(condKey, w, h);
    link.href = offscreen.toDataURL('image/png');
    link.click();
    setStatus(`Downloaded: ${conditionFilename(condKey, w, h)}`, false);
  }, 20);
}

async function exportAll() {
  let { w, h } = getResolution();
  let opts = getOpts();
  let offscreen = document.getElementById('offscreen-canvas');
  offscreen.width = w;
  offscreen.height = h;

  let allKeys = TIME_SLOTS.flatMap(pair => pair);
  setStatus(`Exporting 10 PNGs at ${w}×${h}…`, true);

  // Render + download sequentially with small delay to avoid browser blocking
  for (let i = 0; i < allKeys.length; i++) {
    let condKey = allKeys[i];
    await new Promise(resolve => {
      setTimeout(() => {
        setStatus(`Rendering ${i + 1}/10: ${SKY_CONDITIONS[condKey].label}…`, true);
        renderToCanvas(offscreen, condKey, opts);
        let link = document.createElement('a');
        link.download = conditionFilename(condKey, w, h);
        link.href = offscreen.toDataURL('image/png');
        link.click();
        resolve();
      }, i * 120); // 120ms gap — enough for browser download queue
    });
  }

  setStatus(`Done — 10 PNGs exported at ${w}×${h}.`, false);
}

// ============================================================================
// PREVIEW GRID
// ============================================================================

// Store preview canvases for refresh
let previewCanvases = {};

function buildGrid() {
  let grid = document.getElementById('grid');
  grid.innerHTML = '';
  previewCanvases = {};

  let opts = getOpts();

  TIME_SLOTS.forEach(([clearKey, overcastKey]) => {
    let row = document.createElement('div');
    row.className = 'grid-row';

    // Row label
    let labelCell = document.createElement('div');
    labelCell.className = 'row-label-cell';
    let label = document.createElement('div');
    label.className = 'row-label';
    label.textContent = SKY_CONDITIONS[clearKey].label;
    labelCell.appendChild(label);
    row.appendChild(labelCell);

    // Two cards: clear + overcast
    [clearKey, overcastKey].forEach(condKey => {
      let card = document.createElement('div');
      card.className = 'card';

      // Preview canvas (lower res for speed)
      let canvas = document.createElement('canvas');
      canvas.className = 'sky-preview';
      canvas.width = 440;
      canvas.height = 220;
      canvas.title = `Click to download ${SKY_CONDITIONS[condKey].label}`;
      canvas.addEventListener('click', () => downloadCondition(condKey));
      card.appendChild(canvas);
      previewCanvases[condKey] = canvas;

      // Render preview immediately
      renderToCanvas(canvas, condKey, opts);

      // Info row
      let info = document.createElement('div');
      info.className = 'card-info';

      let meta = document.createElement('div');
      let nameEl = document.createElement('div');
      nameEl.className = 'card-label';
      nameEl.textContent = SKY_CONDITIONS[condKey].label;
      meta.appendChild(nameEl);

      // HSB midpoint sub-label
      let cond = SKY_CONDITIONS[condKey];
      let topH = midpoint(cond.topColor.h).toFixed(0);
      let botH = midpoint(cond.botColor.h).toFixed(0);
      let sub = document.createElement('div');
      sub.className = 'card-sub';
      sub.textContent = `top H${topH}  ·  bot H${botH}`;
      meta.appendChild(sub);

      info.appendChild(meta);

      let dlBtn = document.createElement('button');
      dlBtn.className = 'btn-dl';
      dlBtn.textContent = '↓ PNG';
      dlBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        downloadCondition(condKey);
      });
      info.appendChild(dlBtn);

      card.appendChild(info);
      row.appendChild(card);
    });

    grid.appendChild(row);
  });
}

function refreshPreviews() {
  let opts = getOpts();
  TIME_SLOTS.flatMap(pair => pair).forEach(condKey => {
    let canvas = previewCanvases[condKey];
    if (canvas) renderToCanvas(canvas, condKey, opts);
  });
  setStatus('Previews refreshed.', false);
}

// ============================================================================
// RESOLUTION PRESET HANDLER
// ============================================================================

document.getElementById('res-preset').addEventListener('change', function() {
  let val = this.value;
  let customGroup = document.getElementById('custom-dims-group');
  let note = document.getElementById('res-note');

  if (val === 'custom') {
    customGroup.style.display = '';
    let w = parseInt(document.getElementById('custom-w').value) || 1920;
    let h = parseInt(document.getElementById('custom-h').value) || 1080;
    note.textContent = `${w} × ${h} px`;
  } else {
    customGroup.style.display = 'none';
    let [w, h] = val.split('x').map(Number);
    note.textContent = `${w.toLocaleString()} × ${h.toLocaleString()} px`;
  }
});

document.getElementById('custom-w').addEventListener('input', function() {
  let w = parseInt(this.value) || 0;
  let h = parseInt(document.getElementById('custom-h').value) || 0;
  document.getElementById('res-note').textContent = `${w} × ${h} px`;
});

document.getElementById('custom-h').addEventListener('input', function() {
  let w = parseInt(document.getElementById('custom-w').value) || 0;
  let h = parseInt(this.value) || 0;
  document.getElementById('res-note').textContent = `${w} × ${h} px`;
});

// ============================================================================
// OPTION CHANGE HANDLER
// ============================================================================

document.getElementById('show-clouds').addEventListener('change', refreshPreviews);
document.getElementById('use-midpoint').addEventListener('change', refreshPreviews);

// ============================================================================
// BUTTONS
// ============================================================================

document.getElementById('btn-export-all').addEventListener('click', exportAll);
document.getElementById('btn-refresh-all').addEventListener('click', refreshPreviews);

// ============================================================================
// INIT
// ============================================================================

buildGrid();

</script>
</body>
</html>
