<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sky — Shader Version</title>
<style>
  /* Full-bleed canvas, no scrollbars */
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<!-- ========================================================================
  VERTEX SHADER
  ==========================================================================
  The vertex shader runs once per vertex (corner of our full-screen quad).
  Its only job: pass the normalized position to the fragment shader.
  
  "attribute" = per-vertex input data (here: x,y position of each corner)
  "varying"   = value interpolated across pixels between vertices
  
  We draw a single rectangle that covers the entire screen. The GPU
  interpolates vUV smoothly across every pixel — this is what gives us
  banding-free gradients. Each pixel gets its own unique vUV value.
  ======================================================================== -->

<script id="vertex-shader" type="x-shader/x-vertex">
  // Each vertex has a 2D position (-1 to 1 in clip space)
  attribute vec2 aPosition;
  
  // This gets interpolated per-pixel and sent to the fragment shader.
  // vUV.x = 0 at left edge, 1 at right edge
  // vUV.y = 0 at top edge, 1 at bottom edge
  varying vec2 vUV;
  
  void main() {
    // Map from clip space (-1 to 1) to UV space (0 to 1)
    vUV = aPosition * 0.5 + 0.5;
    
    // Flip Y so 0 = top (matches screen coordinates)
    vUV.y = 1.0 - vUV.y;
    
    // Set the vertex position (required output)
    gl_Position = vec4(aPosition, 0.0, 1.0);
  }
</script>

<!-- ========================================================================
  FRAGMENT SHADER
  ==========================================================================
  The fragment shader runs once PER PIXEL, every frame. This is the core.
  
  Unlike the p5 version which draws one rectangle per row (creating visible
  color steps), this shader computes a unique color for every single pixel.
  The math is the same — Lab color space interpolation — but the resolution
  is continuous rather than discrete. No banding possible.
  
  "uniform" = value set from JavaScript, same for all pixels in a frame
  "varying" = value interpolated from vertex shader (different per pixel)
  
  KEY CONCEPT: The GPU runs this function millions of times in parallel,
  once for each pixel on screen, every frame. That's why shaders are fast
  even though they do complex color math per pixel.
  ======================================================================== -->

<script id="fragment-shader" type="x-shader/x-fragment">
  // mediump = medium precision floats. Good enough for color math,
  // and more compatible across devices than highp.
  precision mediump float;
  
  // From the vertex shader: our position on screen (0-1 range)
  varying vec2 vUV;
  
  // ---- UNIFORMS: values set from JavaScript each frame ----
  
  // Current state: top and bottom colors (already in RGB, 0-1 range)
  uniform vec3 uCurrentTop;
  uniform vec3 uCurrentBot;
  
  // Target state: what we're transitioning toward
  uniform vec3 uTargetTop;
  uniform vec3 uTargetBot;
  
  // Transition progress: 0.0 = fully current, 1.0 = fully target
  uniform float uTransitionT;
  
  // ======================================================================
  // COLOR SPACE CONVERSION: RGB ↔ Lab
  // ======================================================================
  // Lab (CIELAB) color space is designed to be perceptually uniform —
  // equal numerical distances correspond to equal perceived color
  // differences. Interpolating in Lab produces smooth, natural gradients
  // without the muddy midpoints you get interpolating in RGB.
  //
  // The pipeline: RGB → linear RGB → XYZ → Lab (and back)
  // Same math as v2's betterLerp(), just written in GLSL.
  // ======================================================================
  
  // Step 1: Remove sRGB gamma curve (gamma-encoded → linear light)
  // sRGB isn't linear — a value of 0.5 isn't half the light of 1.0.
  // We need linear values for the XYZ conversion to be correct.
  vec3 srgbToLinear(vec3 c) {
    // The sRGB spec has a split curve: linear segment near black,
    // power curve for the rest. This matches v2's "if (r > 0.04045)" check.
    vec3 lo = c / 12.92;
    vec3 hi = pow((c + 0.055) / 1.055, vec3(2.4));
    
    // step() returns 0.0 if c < 0.04045, 1.0 if c >= 0.04045
    // mix() then picks lo or hi accordingly
    return mix(lo, hi, step(vec3(0.04045), c));
  }
  
  // Step 2: Apply sRGB gamma curve (linear light → gamma-encoded)
  vec3 linearToSrgb(vec3 c) {
    vec3 lo = c * 12.92;
    vec3 hi = 1.055 * pow(c, vec3(1.0 / 2.4)) - 0.055;
    return mix(lo, hi, step(vec3(0.0031308), c));
  }
  
  // Step 3: Linear RGB → CIE XYZ (the master color space)
  // The 3x3 matrix maps from sRGB's primaries to XYZ's reference.
  // D65 illuminant (standard daylight white point).
  vec3 rgbToXyz(vec3 c) {
    // Each row of this matrix defines how much of R, G, B
    // contributes to X, Y, and Z respectively.
    return vec3(
      dot(c, vec3(0.4124, 0.3576, 0.1805)),
      dot(c, vec3(0.2126, 0.7152, 0.0722)),  // Y = luminance
      dot(c, vec3(0.0193, 0.1192, 0.9505))
    );
  }
  
  // Step 4: CIE XYZ → Linear RGB
  vec3 xyzToRgb(vec3 c) {
    return vec3(
      dot(c, vec3( 3.2406, -1.5372, -0.4986)),
      dot(c, vec3(-0.9689,  1.8758,  0.0415)),
      dot(c, vec3( 0.0557, -0.2040,  1.0570))
    );
  }
  
  // Step 5: XYZ → Lab
  // The cube-root function makes Lab perceptually uniform.
  // D65 white point: X=95.047, Y=100.0, Z=108.883
  vec3 xyzToLab(vec3 xyz) {
    // Normalize by D65 white point
    vec3 n = xyz / vec3(0.95047, 1.0, 1.08883);
    
    // Apply the Lab transfer function (cube root with linear segment near 0)
    vec3 f;
    float threshold = 0.008856;
    // For each component: if > threshold, use cube root; else use linear approximation
    f.x = n.x > threshold ? pow(n.x, 1.0/3.0) : (7.787 * n.x + 16.0/116.0);
    f.y = n.y > threshold ? pow(n.y, 1.0/3.0) : (7.787 * n.y + 16.0/116.0);
    f.z = n.z > threshold ? pow(n.z, 1.0/3.0) : (7.787 * n.z + 16.0/116.0);
    
    // L = lightness (0-100), a = green-red, b = blue-yellow
    float L = 116.0 * f.y - 16.0;
    float a = 500.0 * (f.x - f.y);
    float b = 200.0 * (f.y - f.z);
    
    return vec3(L, a, b);
  }
  
  // Step 6: Lab → XYZ
  vec3 labToXyz(vec3 lab) {
    float fy = (lab.x + 16.0) / 116.0;
    float fx = lab.y / 500.0 + fy;
    float fz = fy - lab.z / 200.0;
    
    float threshold = 0.008856;
    float fx3 = fx * fx * fx;
    float fy3 = fy * fy * fy;
    float fz3 = fz * fz * fz;
    
    vec3 xyz;
    xyz.x = (fx3 > threshold ? fx3 : (fx - 16.0/116.0) / 7.787) * 0.95047;
    xyz.y = (fy3 > threshold ? fy3 : (fy - 16.0/116.0) / 7.787) * 1.0;
    xyz.z = (fz3 > threshold ? fz3 : (fz - 16.0/116.0) / 7.787) * 1.08883;
    
    return xyz;
  }
  
  // ======================================================================
  // THE FULL PIPELINE: interpolate two RGB colors through Lab space
  // ======================================================================
  // This is the shader equivalent of v2's betterLerp() function.
  // RGB → linear → XYZ → Lab → lerp → Lab → XYZ → linear → RGB
  //
  // Why all these steps? Each conversion serves a purpose:
  //   sRGB→linear: removes display gamma so math is physically correct
  //   linear→XYZ: device-independent color coordinates
  //   XYZ→Lab: perceptually uniform space for interpolation
  //   (interpolate here)
  //   Lab→XYZ→linear→sRGB: reverse the whole chain for display
  // ======================================================================
  
  vec3 labLerp(vec3 rgb1, vec3 rgb2, float t) {
    // Forward: RGB → Lab
    vec3 lab1 = xyzToLab(rgbToXyz(srgbToLinear(rgb1)));
    vec3 lab2 = xyzToLab(rgbToXyz(srgbToLinear(rgb2)));
    
    // Interpolate in Lab (the whole point — smooth perceptual blending)
    vec3 labMix = mix(lab1, lab2, t);
    
    // Reverse: Lab → RGB
    vec3 rgb = linearToSrgb(xyzToRgb(labToXyz(labMix)));
    
    // Clamp to valid display range
    return clamp(rgb, 0.0, 1.0);
  }
  
  // ======================================================================
  // EASING
  // ======================================================================
  // Same easeInOut as v2: slow start, slow end, smooth middle.
  // Makes transitions feel natural rather than mechanical.
  // ======================================================================
  
  float easeInOut(float t) {
    return t < 0.5 ? 2.0 * t * t : -1.0 + (4.0 - 2.0 * t) * t;
  }
  
  // ======================================================================
  // MAIN — runs once for every pixel, every frame
  // ======================================================================
  
  void main() {
    // vUV.y = 0 at top, 1 at bottom (set up in vertex shader)
    float ny = vUV.y;
    
    // Ease the transition for smoother state changes
    float t = easeInOut(uTransitionT);
    
    // Step 1: Interpolate the current state's gradient (top → bottom)
    vec3 currentColor = labLerp(uCurrentTop, uCurrentBot, ny);
    
    // Step 2: Interpolate the target state's gradient (top → bottom)
    vec3 targetColor = labLerp(uTargetTop, uTargetBot, ny);
    
    // Step 3: Crossfade between current and target states
    // This is also done in Lab space for perceptual smoothness
    vec3 finalColor = labLerp(currentColor, targetColor, t);
    
    // Output the pixel color (alpha = 1.0, fully opaque)
    gl_FragColor = vec4(finalColor, 1.0);
  }
</script>

<!-- ========================================================================
  JAVASCRIPT — State machine, condition management, WebGL setup
  ==========================================================================
  This mirrors v2's logic: PRNG-based condition instantiation, forward-only
  time sequence (dawn→midday→sunset→dusk→night→dawn), continuous transitions.
  
  The difference: instead of drawing rows with p5's rect(), we send colors
  to the GPU as "uniforms" and let the shader compute every pixel.
  ======================================================================== -->

<script>
// ============================================================================
// PRNG — Same sfc32 generator as v2 for identical random sequences
// ============================================================================

// Generate a random token hash (same as v2's setup)
let tokenData = "";
for (let i = 0; i < 66; i++) {
  tokenData += (Math.floor(Math.random() * 16)).toString(16);
}

class Random {
  constructor() {
    this.useA = false;
    let sfc32 = function(uint128Hex) {
      let a = parseInt(uint128Hex.substr(0, 8), 16);
      let b = parseInt(uint128Hex.substr(8, 8), 16);
      let c = parseInt(uint128Hex.substr(16, 8), 16);
      let d = parseInt(uint128Hex.substr(24, 8), 16);
      return function() {
        a |= 0; b |= 0; c |= 0; d |= 0;
        let t = (((a + b) | 0) + d) | 0;
        d = (d + 1) | 0;
        a = b ^ (b >>> 9);
        b = (c + (c << 3)) | 0;
        c = (c << 21) | (c >>> 11);
        c = (c + t) | 0;
        return (t >>> 0) / 4294967296;
      };
    };
    this.prngA = new sfc32(tokenData.substr(2, 32));
    this.prngB = new sfc32(tokenData.substr(34, 32));
    for (let i = 0; i < 1e6; i += 2) { this.prngA(); this.prngB(); }
  }
  random_dec() { this.useA = !this.useA; return this.useA ? this.prngA() : this.prngB(); }
  random_num(a, b) { return a + (b - a) * this.random_dec(); }
  random_int(a, b) { return Math.floor(this.random_num(a, b + 1)); }
}

const R = new Random();

// ============================================================================
// SKY CONDITIONS — Identical to v2
// Each condition defines HSB ranges for top and bottom gradient colors.
// A specific instance picks random values within these ranges.
// ============================================================================

const SKY_CONDITIONS = {
  // ---- CLEAR ----
  dawn:           { topColor: { h:[212,228], s:[65,75],  b:[31,39] }, botColor: { h:[10,26],   s:[50,60], b:[86,94] } },
  midday:         { topColor: { h:[205,215], s:[81,89],  b:[85,91] }, botColor: { h:[195,205], s:[31,39], b:[92,98] } },
  sunset:         { topColor: { h:[232,248], s:[29,41],  b:[46,54] }, botColor: { h:[24,40],   s:[84,96], b:[93,100]} },
  dusk:           { topColor: { h:[224,236], s:[26,34],  b:[39,45] }, botColor: { h:[274,286], s:[24,32], b:[62,68] } },
  night:          { topColor: { h:[221,229], s:[57,63],  b:[6,10]  }, botColor: { h:[211,219], s:[39,45], b:[20,24] } },
  // ---- OVERCAST ----
  overcastDawn:   { topColor: { h:[211,219], s:[16,20],  b:[56,60] }, botColor: { h:[26,34],   s:[10,14], b:[74,78] } },
  overcastMidday: { topColor: { h:[207,213], s:[10,14],  b:[76,80] }, botColor: { h:[202,208], s:[6,10],  b:[86,90] } },
  overcastSunset: { topColor: { h:[24,32],   s:[15,21],  b:[39,45] }, botColor: { h:[20,28],   s:[11,17], b:[57,63] } },
  overcastDusk:   { topColor: { h:[215,221], s:[16,20],  b:[22,26] }, botColor: { h:[213,219], s:[6,10],  b:[46,50] } },
  overcastNight:  { topColor: { h:[22,28],   s:[22,28],  b:[6,10]  }, botColor: { h:[32,38],   s:[75,81], b:[70,74] } },
};

// ============================================================================
// TIME SEQUENCE — Forward-only cycle, same as v2
// From any condition, can go to same-slot variant or next slot's variants.
// ============================================================================

const TIME_SLOTS = [
  ['dawn', 'overcastDawn'],
  ['midday', 'overcastMidday'],
  ['sunset', 'overcastSunset'],
  ['dusk', 'overcastDusk'],
  ['night', 'overcastNight'],
];

function pickCondition(current) {
  if (!current) return TIME_SLOTS[0][R.random_int(0, 1)];
  let slotIdx = 0;
  for (let i = 0; i < TIME_SLOTS.length; i++) {
    if (TIME_SLOTS[i].indexOf(current) !== -1) { slotIdx = i; break; }
  }
  let nextIdx = (slotIdx + 1) % TIME_SLOTS.length;
  let pool = TIME_SLOTS[slotIdx].concat(TIME_SLOTS[nextIdx]);
  return pool[R.random_int(0, pool.length - 1)];
}

// ============================================================================
// COLOR CONVERSION (JavaScript side)
// We convert HSB → RGB here so the shader receives RGB directly.
// Same hsbToRgb as v2 — output is 0-1 range (not 0-255).
// ============================================================================

function hsbToRgb01(hsb) {
  let h = hsb[0], s = hsb[1] / 100, v = hsb[2] / 100;
  let c = v * s;
  let x = c * (1 - Math.abs(((h / 60) % 2) - 1));
  let m = v - c;
  let r, g, b;
  if (h < 60)       { r=c; g=x; b=0; }
  else if (h < 120) { r=x; g=c; b=0; }
  else if (h < 180) { r=0; g=c; b=x; }
  else if (h < 240) { r=0; g=x; b=c; }
  else if (h < 300) { r=x; g=0; b=c; }
  else              { r=c; g=0; b=x; }
  return [r + m, g + m, b + m];  // 0-1 range for GPU
}

function wrapHSB(c) {
  return [((c[0] % 360) + 360) % 360, Math.max(0, Math.min(100, c[1])), Math.max(0, Math.min(100, c[2]))];
}

// ============================================================================
// CONDITION INSTANTIATION
// Pick random HSB values within a condition's ranges, convert to RGB.
// No clouds in the shader version (scope: gradient only).
// ============================================================================

function instantiateCondition(key) {
  let cond = SKY_CONDITIONS[key];
  return {
    key: key,
    topColor: hsbToRgb01(wrapHSB([
      R.random_num(cond.topColor.h[0], cond.topColor.h[1]),
      R.random_num(cond.topColor.s[0], cond.topColor.s[1]),
      R.random_num(cond.topColor.b[0], cond.topColor.b[1]),
    ])),
    botColor: hsbToRgb01(wrapHSB([
      R.random_num(cond.botColor.h[0], cond.botColor.h[1]),
      R.random_num(cond.botColor.s[0], cond.botColor.s[1]),
      R.random_num(cond.botColor.b[0], cond.botColor.b[1]),
    ])),
  };
}

// ============================================================================
// TRANSITION TIMING — Same as v2
// ============================================================================

const TRANSITION_DURATION = 60; // seconds per transition
let transitionT = 0;
let lastFrameTime = null;

let currentConditionKey;
let currentInstance, targetInstance;

// Initialize
currentConditionKey = pickCondition(null);
currentInstance = instantiateCondition(currentConditionKey);
let nextKey = pickCondition(currentConditionKey);
targetInstance = instantiateCondition(nextKey);

// ============================================================================
// WEBGL SETUP
// ============================================================================
// WebGL is the browser's interface to the GPU. The setup is boilerplate:
// 1. Get a WebGL context from the canvas
// 2. Compile vertex + fragment shaders into a "program"
// 3. Create a full-screen rectangle (two triangles) to draw on
// 4. Each frame: update uniforms (colors, transition progress), draw
//
// The actual rendering happens entirely on the GPU via the shaders above.
// JavaScript's only job is to manage state transitions and pass colors in.
// ============================================================================

const canvas = document.getElementById('sky');
const gl = canvas.getContext('webgl', { antialias: false, alpha: false });

if (!gl) {
  document.body.innerHTML = '<p style="color:white;font:24px monospace;padding:40px;">WebGL not supported in this browser.</p>';
  throw new Error('No WebGL');
}

// ---- Compile shaders ----

function compileShader(gl, source, type) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    console.error('Shader compile error:', gl.getShaderInfoLog(shader));
    gl.deleteShader(shader);
    return null;
  }
  return shader;
}

const vertSrc = document.getElementById('vertex-shader').textContent;
const fragSrc = document.getElementById('fragment-shader').textContent;

const vertShader = compileShader(gl, vertSrc, gl.VERTEX_SHADER);
const fragShader = compileShader(gl, fragSrc, gl.FRAGMENT_SHADER);

// Link shaders into a program (vertex + fragment work together)
const program = gl.createProgram();
gl.attachShader(program, vertShader);
gl.attachShader(program, fragShader);
gl.linkProgram(program);

if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
  console.error('Program link error:', gl.getProgramInfoLog(program));
}

gl.useProgram(program);

// ---- Create geometry: a full-screen quad (two triangles) ----
// Clip space coordinates: -1,-1 = bottom-left, 1,1 = top-right
// Two triangles sharing an edge form a rectangle covering the entire viewport.

const posBuffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
  -1, -1,   // bottom-left
   1, -1,   // bottom-right
  -1,  1,   // top-left
   1,  1,   // top-right
]), gl.STATIC_DRAW);

// Connect the buffer to the "aPosition" attribute in the vertex shader
const aPosition = gl.getAttribLocation(program, 'aPosition');
gl.enableVertexAttribArray(aPosition);
gl.vertexAttribPointer(aPosition, 2, gl.FLOAT, false, 0, 0);

// ---- Get uniform locations ----
// Uniforms are how JavaScript sends data to the shader each frame.
// We look up their locations once, then set values in the render loop.

const uCurrentTop   = gl.getUniformLocation(program, 'uCurrentTop');
const uCurrentBot   = gl.getUniformLocation(program, 'uCurrentBot');
const uTargetTop    = gl.getUniformLocation(program, 'uTargetTop');
const uTargetBot    = gl.getUniformLocation(program, 'uTargetBot');
const uTransitionT  = gl.getUniformLocation(program, 'uTransitionT');

// ---- Handle canvas resize ----

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
}

window.addEventListener('resize', resize);
resize();

// ============================================================================
// RENDER LOOP
// ============================================================================
// requestAnimationFrame calls this ~60 times per second.
// Each frame:
// 1. Advance the transition timer
// 2. If transition complete, pick next condition
// 3. Send current colors to the GPU
// 4. Draw the full-screen quad (triggers the fragment shader for every pixel)
// ============================================================================

function frame(now) {
  // Calculate delta time in seconds
  if (lastFrameTime === null) lastFrameTime = now;
  let dt = (now - lastFrameTime) / 1000;
  lastFrameTime = now;
  
  // Cap delta to prevent huge jumps if tab was backgrounded
  if (dt > 1) dt = 1 / 60;
  
  // Advance transition
  transitionT += dt / TRANSITION_DURATION;
  
  if (transitionT >= 1) {
    // Transition complete — current becomes target, pick new target
    transitionT = 0;
    currentInstance = targetInstance;
    currentConditionKey = currentInstance.key;
    let nextKey = pickCondition(currentConditionKey);
    targetInstance = instantiateCondition(nextKey);
  }
  
  // Send colors to the GPU
  // uniform3f sets a vec3 uniform (three floats: r, g, b)
  gl.uniform3f(uCurrentTop, currentInstance.topColor[0], currentInstance.topColor[1], currentInstance.topColor[2]);
  gl.uniform3f(uCurrentBot, currentInstance.botColor[0], currentInstance.botColor[1], currentInstance.botColor[2]);
  gl.uniform3f(uTargetTop,  targetInstance.topColor[0],  targetInstance.topColor[1],  targetInstance.topColor[2]);
  gl.uniform3f(uTargetBot,  targetInstance.botColor[0],  targetInstance.botColor[1],  targetInstance.botColor[2]);
  gl.uniform1f(uTransitionT, transitionT);
  
  // Draw the quad — this triggers the fragment shader for every pixel
  // TRIANGLE_STRIP with 4 vertices = 2 triangles = 1 rectangle
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  
  // Schedule next frame
  requestAnimationFrame(frame);
}

// Start the render loop
requestAnimationFrame(frame);

// ---- Save on 'S' key (same as v2) ----
document.addEventListener('keydown', function(e) {
  if (e.key === 's' || e.key === 'S') {
    let link = document.createElement('a');
    link.download = tokenData + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
});
</script>

</body>
</html>
