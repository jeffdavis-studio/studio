<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Sky — Tuner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      display: flex; 
      height: 100vh; 
      overflow: hidden;
      background: #111; 
      font-family: 'SF Mono', 'Menlo', monospace;
      color: #ccc;
    }
    #sky-container { 
      flex: 1;
      min-width: 0;
      position: relative;
      overflow: hidden;
    }
    #sky-container > main,
    #sky-container > div {
      position: absolute;
      inset: 0;
    }
    #sky-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
    #condition-label {
      position: absolute;
      bottom: 16px;
      left: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 1;
    }
    #controls {
      width: 320px;
      flex-shrink: 0;
      padding: 20px 24px 20px 16px;
      overflow-y: auto;
      border-right: 1px solid #222;
      background: #0e0e0e;
    }
    h2 {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #222;
    }
    .section {
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      color: #555;
      margin-bottom: 10px;
    }
    .row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }
    label {
      font-size: 11px;
      color: #888;
      width: 100px;
      flex-shrink: 0;
    }
    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 2px;
      background: #333;
      outline: none;
      border-radius: 1px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #999;
      cursor: pointer;
    }
    .value {
      font-size: 10px;
      color: #666;
      width: 46px;
      text-align: right;
      flex-shrink: 0;
    }
    .btn {
      width: 100%;
      padding: 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #888;
      font-size: 11px;
      font-family: inherit;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 4px;
      border-radius: 2px;
    }
    .btn:hover { background: #222; color: #bbb; }
    .btn-primary { border-color: #555; color: #bbb; }
    .btn.active { background: #2a2a2a; border-color: #666; color: #ddd; }
    .state-indicator {
      font-size: 10px;
      color: #555;
      margin-top: 12px;
      line-height: 1.6;
      padding: 8px;
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-radius: 2px;
    }
    .state-indicator span { color: #888; }
    .divider { 
      height: 1px; 
      background: #1e1e1e; 
      margin: 16px 0; 
    }
    details {
      margin-bottom: 2px;
    }
    details summary {
      font-size: 11px;
      color: #888;
      cursor: pointer;
      padding: 6px 0;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    details summary::-webkit-details-marker { display: none; }
    details summary::before {
      content: '▸';
      font-size: 9px;
      color: #555;
      transition: transform 0.15s;
    }
    details[open] summary::before {
      transform: rotate(90deg);
    }
    details .detail-body {
      padding: 4px 0 8px 14px;
    }
    .color-group-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #444;
      margin: 6px 0 4px;
    }
    .range-row {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
      gap: 4px;
    }
    .range-row label {
      font-size: 10px;
      color: #666;
      width: 20px;
      flex-shrink: 0;
    }
    .range-row input[type=range] {
      flex: 1;
      min-width: 0;
    }
    .range-row .value {
      font-size: 9px;
      width: 28px;
    }
  </style>
</head>
<body>
  <div id="controls">
    <h2>The Sky — Tuner</h2>

    <div class="section">
      <div class="section-title">Transition</div>
      <div class="row">
        <label>Speed</label>
        <input type="range" id="transitionDuration" min="5" max="180" step="1" value="60">
        <div class="value" id="transitionDuration-val">60s</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="section-title">Condition Colors</div>
      <div id="condition-controls"></div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="section-title">Cloud Formation</div>
      <div class="row">
        <label>Count Min</label>
        <input type="range" id="cloudCountMin" min="0" max="5" step="1" value="0">
        <div class="value" id="cloudCountMin-val">0</div>
      </div>
      <div class="row">
        <label>Count Max</label>
        <input type="range" id="cloudCountMax" min="0" max="5" step="1" value="3">
        <div class="value" id="cloudCountMax-val">3</div>
      </div>
      <div class="row">
        <label>Position Min</label>
        <input type="range" id="cloudPositionMin" min="0" max="0.5" step="0.05" value="0.1">
        <div class="value" id="cloudPositionMin-val">0.10</div>
      </div>
      <div class="row">
        <label>Position Max</label>
        <input type="range" id="cloudPositionMax" min="0.5" max="1.0" step="0.05" value="0.9">
        <div class="value" id="cloudPositionMax-val">0.90</div>
      </div>
      <div class="row">
        <label>Height Min</label>
        <input type="range" id="cloudHeightMin" min="0.01" max="0.30" step="0.01" value="0.05">
        <div class="value" id="cloudHeightMin-val">0.05</div>
      </div>
      <div class="row">
        <label>Height Max</label>
        <input type="range" id="cloudHeightMax" min="0.05" max="0.60" step="0.01" value="0.30">
        <div class="value" id="cloudHeightMax-val">0.30</div>
      </div>
      <div class="row">
        <label>Falloff Min</label>
        <input type="range" id="cloudFalloffMin" min="0.01" max="0.15" step="0.005" value="0.03">
        <div class="value" id="cloudFalloffMin-val">0.030</div>
      </div>
      <div class="row">
        <label>Falloff Max</label>
        <input type="range" id="cloudFalloffMax" min="0.03" max="0.30" step="0.005" value="0.14">
        <div class="value" id="cloudFalloffMax-val">0.140</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="section-title">Cloud Color</div>
      <div class="row">
        <label>Opacity Min</label>
        <input type="range" id="cloudOpacityMin" min="0.0" max="0.5" step="0.05" value="0.15">
        <div class="value" id="cloudOpacityMin-val">0.15</div>
      </div>
      <div class="row">
        <label>Opacity Max</label>
        <input type="range" id="cloudOpacityMax" min="0.1" max="1.0" step="0.05" value="0.60">
        <div class="value" id="cloudOpacityMax-val">0.60</div>
      </div>
      <div class="row">
        <label>Pickup Min</label>
        <input type="range" id="cloudBottomPickupMin" min="0" max="1.0" step="0.05" value="0.00">
        <div class="value" id="cloudBottomPickupMin-val">0.00</div>
      </div>
      <div class="row">
        <label>Pickup Max</label>
        <input type="range" id="cloudBottomPickupMax" min="0" max="1.0" step="0.05" value="0.30">
        <div class="value" id="cloudBottomPickupMax-val">0.30</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <button class="btn" id="btn-random" onclick="resumeRandom()">Random</button>
      <button class="btn" id="btn-dawn" onclick="cycleToCondition('dawn')">Dawn</button>
      <button class="btn" id="btn-midday" onclick="cycleToCondition('midday')">Midday</button>
      <button class="btn" id="btn-sunset" onclick="cycleToCondition('sunset')">Sunset</button>
      <button class="btn" id="btn-dusk" onclick="cycleToCondition('dusk')">Dusk</button>
      <button class="btn" id="btn-night" onclick="cycleToCondition('night')">Night</button>
      <button class="btn" id="btn-overcastDawn" onclick="cycleToCondition('overcastDawn')">Overcast Dawn</button>
      <button class="btn" id="btn-overcastMidday" onclick="cycleToCondition('overcastMidday')">Overcast Midday</button>
      <button class="btn" id="btn-overcastSunset" onclick="cycleToCondition('overcastSunset')">Overcast Sunset</button>
      <button class="btn" id="btn-overcastDusk" onclick="cycleToCondition('overcastDusk')">Overcast Dusk</button>
      <button class="btn" id="btn-overcastNight" onclick="cycleToCondition('overcastNight')">Overcast Night</button>
    </div>

    <div class="divider"></div>

    <div class="state-indicator" id="state-indicator">
      Current: <span id="si-current">—</span><br>
      Target: <span id="si-target">—</span><br>
      Progress: <span id="si-progress">—</span><br>
      FPS: <span id="si-fps">—</span>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="section-title">Save</div>
      <button class="btn" onclick="saveFrame()">Save Frame (S)</button>
    </div>
  </div>

  <div id="sky-container">
    <div id="condition-label">—</div>
  </div>

  <!-- The sky sketch is loaded here. Controls are wired after p5 is ready. -->
  <script src="TheSky_v2.js"></script>

  <script>
    // Wire controls to the live global variables exposed in TheSky_v2.js
    // This only works because p5 runs in global mode — all those vars are window-level.

    function wireSlider(id, getter, setter, formatter) {
      let el = document.getElementById(id);
      let val = document.getElementById(id + '-val');
      el.addEventListener('input', function() {
        let v = parseFloat(el.value);
        setter(v);
        val.textContent = formatter ? formatter(v) : v;
      });
    }

    function buildConditionControls() {
      let container = document.getElementById('condition-controls');
      let keys = Object.keys(SKY_CONDITIONS);
      keys.forEach(function(key) {
        let cond = SKY_CONDITIONS[key];
        let details = document.createElement('details');
        let summary = document.createElement('summary');
        summary.textContent = cond.label;
        details.appendChild(summary);

        let body = document.createElement('div');
        body.className = 'detail-body';

        function addColorGroup(label, colorObj) {
          let gl = document.createElement('div');
          gl.className = 'color-group-label';
          gl.textContent = label;
          body.appendChild(gl);

          let channels = [
            { ch: 'h', label: 'H', min: 0, max: 360, step: 1 },
            { ch: 's', label: 'S', min: 0, max: 100, step: 1 },
            { ch: 'b', label: 'B', min: 0, max: 100, step: 1 },
          ];
          channels.forEach(function(c) {
            let arr = colorObj[c.ch];
            for (let idx = 0; idx < 2; idx++) {
              let row = document.createElement('div');
              row.className = 'range-row';
              let lbl = document.createElement('label');
              lbl.textContent = c.label + (idx === 0 ? '↓' : '↑');
              let input = document.createElement('input');
              input.type = 'range';
              input.min = c.min;
              input.max = c.max;
              input.step = c.step;
              input.value = arr[idx];
              let val = document.createElement('div');
              val.className = 'value';
              val.textContent = arr[idx];
              input.addEventListener('input', function() {
                let v = parseFloat(input.value);
                arr[idx] = v;
                val.textContent = v;
              });
              row.appendChild(lbl);
              row.appendChild(input);
              row.appendChild(val);
              body.appendChild(row);
            }
          });
        }

        addColorGroup('Top', cond.topColor);
        addColorGroup('Bottom', cond.botColor);
        details.appendChild(body);
        container.appendChild(details);
      });
    }

    window.addEventListener('load', function() {
      wireSlider('transitionDuration', null, v => { transitionDuration = v; }, v => v + 's');

      buildConditionControls();
      updateButtonStates();

      wireSlider('cloudCountMin', null, v => { cloudCountMin = v; }, v => v);
      wireSlider('cloudCountMax', null, v => { cloudCountMax = v; }, v => v);
      wireSlider('cloudPositionMin', null, v => { cloudPositionMin = v; }, v => v.toFixed(2));
      wireSlider('cloudPositionMax', null, v => { cloudPositionMax = v; }, v => v.toFixed(2));
      wireSlider('cloudHeightMin', null, v => { cloudHeightMin = v; }, v => v.toFixed(2));
      wireSlider('cloudHeightMax', null, v => { cloudHeightMax = v; }, v => v.toFixed(2));
      wireSlider('cloudFalloffMin', null, v => { cloudFalloffMin = v; }, v => v.toFixed(3));
      wireSlider('cloudFalloffMax', null, v => { cloudFalloffMax = v; }, v => v.toFixed(3));

      wireSlider('cloudOpacityMin', null, v => { cloudOpacityMin = v; }, v => v.toFixed(2));
      wireSlider('cloudOpacityMax', null, v => { cloudOpacityMax = v; }, v => v.toFixed(2));
      wireSlider('cloudBottomPickupMin', null, v => { cloudBottomPickupMin = v; }, v => v.toFixed(2));
      wireSlider('cloudBottomPickupMax', null, v => { cloudBottomPickupMax = v; }, v => v.toFixed(2));
    });

    function updateButtonStates() {
      let allBtns = document.querySelectorAll('.section .btn[id^="btn-"]');
      allBtns.forEach(function(btn) { btn.classList.remove('active'); });
      if (lockedCondition) {
        let active = document.getElementById('btn-' + lockedCondition);
        if (active) active.classList.add('active');
      } else {
        document.getElementById('btn-random').classList.add('active');
      }
    }

    setInterval(function() {
      if (typeof transitionT === 'undefined') return;
      document.getElementById('si-current').textContent = currentConditionKey || '—';
      document.getElementById('si-target').textContent = (targetInstance && targetInstance.conditionKey) || '—';
      document.getElementById('si-progress').textContent = (transitionT * 100).toFixed(1) + '%';
      document.getElementById('si-fps').textContent = (typeof frameRate === 'function') ? frameRate().toFixed(1) : '—';

      let label = document.getElementById('condition-label');
      if (typeof SKY_CONDITIONS !== 'undefined' && currentConditionKey) {
        let cond = SKY_CONDITIONS[currentConditionKey];
        label.textContent = cond ? cond.label : currentConditionKey;
      }
    }, 500);

    function resumeRandom() {
      if (typeof transitionT === 'undefined') return;
      lockedCondition = null;
      transitionT = 1;
      updateButtonStates();
    }

    function cycleToCondition(key) {
      if (typeof SKY_CONDITIONS === 'undefined') return;
      if (!SKY_CONDITIONS[key]) return;
      lockedCondition = key;
      currentInstance = targetInstance;
      currentConditionKey = currentInstance.conditionKey;
      targetInstance = instantiateCondition(key);
      transitionT = 0;
      updateButtonStates();
    }

    function saveFrame() {
      if (typeof saveCanvas !== 'undefined') {
        saveCanvas('the-sky-tuner', 'png');
      }
    }
  </script>
</body>
</html>
